<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Paws of Destiny · Idle Dog RPG</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Arial', sans-serif;
    }
    body {
      background: #000000;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
    }
    .game-container {
      max-width: 500px;
      width: 100%;
      background: #000000;
      border-radius: 0;
      box-shadow: none;
      overflow: hidden;
      border: none;
    }
    .title-banner {
      width: 100%;
      padding: 8px 0;
      background: #000000;
      border-bottom: 1px solid #222222;
    }
    .title-banner img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
    }
    .game-header {
      background: #000000;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #222222;
    }
    .game-header h2 {
      color: #ffffff;
      font-weight: 800;
      letter-spacing: 2px;
      font-size: 1rem;
      text-shadow: 0 2px 4px black;
    }
    .resource-badge {
      background: #111111;
      padding: 6px 16px;
      border-radius: 30px;
      color: #ffd700;
      font-weight: bold;
      border: 1px solid #333333;
      font-size: 0.9rem;
    }
    .screen {
      display: none;
      padding: 16px;
      background: #000000;
      min-height: 500px;
    }
    .screen.active {
      display: block;
    }
    .setup-centered {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .breed-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 15px;
      width: 100%;
      max-width: 400px;
    }
    .breed-card {
      background: #0a0a0a;
      border-radius: 24px;
      padding: 12px;
      text-align: center;
      border: 2px solid #222222;
      cursor: pointer;
      transition: all 0.2s;
      color: #cccccc;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .breed-card.selected {
      border: 3px solid #ffd700;
      background: #111111;
      box-shadow: 0 0 18px #ffd700;
    }
    .breed-img-placeholder {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #0a0a0a;
      border-radius: 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888888;
      font-size: 0.75rem;
      background-size: cover;
      background-position: center 35%;
      border: 1px dashed #333333;
      overflow: hidden;
    }
    .breed-name {
      font-weight: bold;
      font-size: 0.8rem;
      text-transform: uppercase;
      margin-top: 4px;
      color: #ffffff;
    }
    .breed-stats {
      font-size: 0.65rem;
      color: #ffd700;
      margin-top: 4px;
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .input-field {
      width: 100%;
      max-width: 400px;
      padding: 14px;
      border-radius: 30px;
      border: 2px solid #333333;
      background: #0a0a0a;
      color: #ffffff;
      font-weight: bold;
      margin: 12px 0;
      outline: none;
      font-size: 1rem;
    }
    .input-field::placeholder {
      color: #888888;
    }
    .start-btn {
      background: #ffd700;
      border: none;
      padding: 16px;
      width: 100%;
      max-width: 400px;
      border-radius: 40px;
      font-weight: bold;
      font-size: 1.2rem;
      color: #000000;
      margin-top: 10px;
      cursor: pointer;
      border-bottom: 4px solid #cc9900;
    }
    .import-btn {
      background: #444444;
      border: none;
      padding: 12px;
      width: 100%;
      max-width: 400px;
      border-radius: 40px;
      font-weight: bold;
      font-size: 1rem;
      color: #ffffff;
      margin-top: 8px;
      cursor: pointer;
      border-bottom: 3px solid #666666;
    }
    .tap-area {
      background: transparent;
      width: 200px;
      height: 200px;
      margin: 20px auto 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      overflow: hidden;
      position: relative;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      outline: none;
    }
    .tap-area.akita-tapper, .tap-area.chihuahua-tapper { width: 220px; height: 220px; }
    .tap-area:active, .tap-area:focus, .tap-area:focus-visible { outline: none; background: transparent; -webkit-tap-highlight-color: transparent; }
    .tap-gif { width: 100%; height: 100%; object-fit: cover; border-radius: 0; pointer-events: none; }
    .tap-gif.akita-gif, .tap-gif.chihuahua-gif { object-fit: contain; padding: 10px; }
    .level-container { margin: 0 auto 10px; max-width: 300px; text-align: center; }
    .level-display { color: #ffd700; font-weight: bold; font-size: 0.9rem; margin-bottom: 4px; }
    .exp-bar-bg { background: #111111; height: 12px; border-radius: 6px; overflow: hidden; border: 1px solid #333333; margin-bottom: 2px; }
    .exp-bar-fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, #ffd700, #ffaa00); transition: width 0.3s ease; }
    .exp-text { color: #888888; font-size: 0.7rem; }
    .prestige-under-tapper { text-align: center; margin: 4px 0 8px; color: #ffd700; font-weight: bold; font-size: 0.85rem; }
    .stat-row { display: flex; justify-content: space-between; color: #ffffff; font-weight: bold; margin: 8px 0; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin: 8px 0; }
    .stat-box { background: #0a0a0a; border-radius: 10px; padding: 8px; text-align: center; border: 1px solid #222222; }
    .stat-box .stat-label { font-size: 0.7rem; color: #888888; }
    .stat-box .stat-value { font-size: 1rem; font-weight: bold; color: #ffd700; }
    .tab-row { display: flex; gap: 4px; margin-top: 14px; flex-wrap: wrap; }
    .tab { flex: 1; min-width: 50px; background: #0a0a0a; padding: 10px 4px; text-align: center; border-radius: 20px 20px 0 0; font-weight: bold; color: #888888; cursor: pointer; border: 1px solid #222222; border-bottom: none; font-size: 0.6rem; }
    .tab.active { background: #000000; color: #ffd700; border-bottom: 2px solid #ffd700; }
    .upgrade-item, .prestige-item { background: #0a0a0a; border-radius: 20px; padding: 12px; margin: 10px 0; display: flex; flex-direction: column; gap: 8px; border: 1px solid #222222; color: #ffffff; }
    .upgrade-info, .prestige-info { display: flex; justify-content: space-between; align-items: center; }
    .upgrade-buttons, .prestige-buttons { display: flex; gap: 8px; }
    .upgrade-buttons button, .prestige-buttons button { flex: 1; font-size: 0.75rem; padding: 8px 10px; }
    .max-buy-btn { background: #ffd700; color: #000000; border-bottom-color: #cc9900; }
    button { background: #222222; border: none; color: #ffffff; font-weight: bold; padding: 10px 16px; border-radius: 30px; cursor: pointer; border-bottom: 3px solid #444444; }
    button:hover { background: #333333; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .polygon-icon { width: 16px; height: 16px; vertical-align: middle; margin-right: 2px; object-fit: contain; }
    .polygon-icon-sm { width: 14px; height: 14px; vertical-align: middle; margin-right: 3px; object-fit: contain; }
    .paypal-icon-sm { width: 24px; height: 24px; vertical-align: middle; margin-right: 3px; object-fit: contain; }
    .game-notification {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #1a1a1a;
      border: 2px solid #ff4444;
      border-radius: 20px;
      padding: 20px 25px;
      z-index: 2000;
      text-align: center;
      box-shadow: 0 0 30px rgba(255, 68, 68, 0.5);
      animation: notificationPop 0.3s ease-out;
    }
    .game-notification.success {
      border-color: #4caf50;
      box-shadow: 0 0 30px rgba(76, 175, 80, 0.5);
    }
    .game-notification .notif-icon { font-size: 2rem; margin-bottom: 8px; }
    .game-notification .notif-message { color: #ffffff; font-weight: bold; font-size: 0.95rem; margin-bottom: 6px; }
    .game-notification .notif-detail { color: #888888; font-size: 0.75rem; margin-bottom: 10px; white-space: pre-line; }
    .game-notification button { background: #ffd700; color: #000000; font-weight: bold; padding: 8px 20px; border-radius: 20px; border: none; cursor: pointer; border-bottom: 3px solid #cc9900; font-size: 0.8rem; }
    @keyframes notificationPop { 0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
    .shop-tier { background: linear-gradient(145deg, #1a1a1a, #0a0a0a); border-radius: 20px; padding: 16px; margin: 10px 0; border: 1px solid #333333; color: #ffffff; position: relative; overflow: hidden; }
    .shop-tier.featured { border: 2px solid #ffd700; box-shadow: 0 0 20px rgba(255,215,0,0.3); }
    .shop-tier.best-value { border: 2px solid #ffd700; box-shadow: 0 0 30px rgba(255,215,0,0.5); background: linear-gradient(145deg, #222200, #0a0a00); }
    .tier-badge { position: absolute; top: 10px; right: 10px; background: #ffd700; color: #000; padding: 4px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: bold; }
    .best-value-badge { position: absolute; top: 10px; right: 10px; background: #ffd700; color: #000; padding: 4px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: bold; animation: glow 2s ease-in-out infinite; }
    @keyframes glow { 0%,100%{box-shadow:0 0 5px #ffd700} 50%{box-shadow:0 0 20px #ffd700} }
    .tier-header { font-size: 1.1rem; font-weight: bold; color: #ffd700; margin-bottom: 4px; }
    .tier-multiplier { font-size: 1.4rem; font-weight: bold; color: #ffffff; }
    .tier-price { font-size: 1.1rem; color: #ffd700; margin: 4px 0; }
    .tier-polygon-price { font-size: 0.9rem; color: #8247e5; margin-bottom: 4px; font-weight: bold; }
    .tier-owned-count { font-size: 0.8rem; color: #ffd700; margin-bottom: 4px; }
    .tier-value { font-size: 0.75rem; color: #888888; margin-bottom: 8px; }
    .polygon-rate { font-size: 0.7rem; color: #8247e5; margin-bottom: 6px; }
    .polygon-rate .live-dot { display: inline-block; width: 6px; height: 6px; background: #4caf50; border-radius: 50%; margin-right: 4px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .buy-tier-btn { width: 100%; background: #ffd700; color: #000; font-weight: bold; padding: 12px; border-radius: 25px; border: none; cursor: pointer; border-bottom: 3px solid #cc9900; font-size: 0.9rem; }
    .buy-tier-btn.paypal { margin-top: 6px; }
    .payment-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .payment-modal-content { background: #1a1a1a; border-radius: 20px; padding: 20px; max-width: 400px; width: 90%; border: 2px solid #8247e5; color: #fff; max-height: 90vh; overflow-y: auto; }
    .payment-modal h3 { color: #8247e5; margin-bottom: 10px; }
    .payment-modal .address-copy { background: #111; padding: 10px; border-radius: 10px; word-break: break-all; font-size: 0.7rem; color: #8247e5; margin: 10px 0; cursor: pointer; border: 1px solid #333; }
    .payment-modal .amount-display { font-size: 1.2rem; color: #ffd700; margin: 10px 0; }
    .payment-modal button { width: 100%; margin: 5px 0; }
    .payment-modal .close-btn { background: #444; border-bottom-color: #666; }
    .payment-modal .verify-btn { background: #1a5c1a; border-bottom-color: #2d8f2d; }
    .payment-modal .verify-btn:disabled { background: #333; border-bottom-color: #555; cursor: not-allowed; }
    .payment-modal .status-text { font-size: 0.8rem; margin: 8px 0; text-align: center; }
    .payment-modal .status-text.verifying { color: #ffd700; }
    .payment-modal .status-text.success { color: #4caf50; }
    .payment-modal .status-text.error { color: #f44336; }
    .payment-modal .status-text.info { color: #ffd700; }
    .boss-card, .arena-card { background: #0a0a0a; border-radius: 20px; padding: 16px; margin: 10px 0; border: 1px solid #333; color: #fff; }
    .boss-hp-bar { background: #111; height: 20px; border-radius: 10px; overflow: hidden; border: 1px solid #333; margin: 10px 0; }
    .boss-hp-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg, #c44, #f66); transition: width 0.3s; }
    .arena-opponent { background: #0a0a0a; border-radius: 15px; padding: 12px; margin: 8px 0; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
    .save-slot { background: #0a0a0a; border-radius: 16px; padding: 14px; margin: 10px 0; border: 1px solid #333; cursor: pointer; transition: all 0.2s; }
    .save-slot:hover { border-color: #ffd700; background: #111; }
    .save-slot h4 { color: #ffd700; margin-bottom: 4px; }
    .save-slot p { color: #888; font-size: 0.8rem; }
    .logout-btn { background: #8b0000; border-bottom-color: #f00; margin-top: 5px; }
    .auto-save-indicator {
      position: fixed;
      bottom: 10px;
      right: 10px;
      background: #1a3a1a;
      color: #4caf50;
      padding: 4px 10px;
      border-radius: 10px;
      font-size: 0.6rem;
      z-index: 500;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .auto-save-indicator.show {
      opacity: 1;
    }
    h3, p { color: #ffffff; }
    .next-cost { font-size: 0.75rem; color: #888; }
    .cost-breakdown { font-size: 0.7rem; color: #ffd700; margin-top: 4px; }
    #importFileInput { display: none; }
  </style>
</head>
<body>
<div class="game-container" id="app"></div>
<input type="file" id="importFileInput" accept=".txt" />
<div class="auto-save-indicator" id="autoSaveIndicator">💾 Auto-saved</div>

<script>
  (function() {
    const suffixes = ['','k','m','b','t','aa','ab','ac','ad','ae','af','ag','ah','ai','aj','ak','al','am','an','ao','ap','aq','ar','as','at','au','av','aw','ax','ay','az','ba','bb','bc','bd','be','bf','bg','bh','bi','bj','bk','bl','bm','bn','bo','bp','bq','br','bs','bt','bu','bv','bw','bx','by','bz','ca','cb','cc','cd','ce','cf','cg','ch','ci','cj','ck','cl','cm','cn','co','cp','cq','cr','cs','ct','cu','cv','cw','cx','cy','cz'];
    function formatNum(num) {
      if (num < 0) return '0';
      if (num < 1000) return Math.floor(num).toString();
      let tier = 0, value = num;
      while (value >= 1000 && tier < suffixes.length - 1) { value /= 1000; tier++; }
      if (tier >= suffixes.length) { const extra = tier - suffixes.length + 1; return value.toFixed(2).replace(/\.?0+$/, '') + String.fromCharCode(97 + Math.floor(extra/26)) + String.fromCharCode(97 + (extra%26)); }
      return value.toFixed(2).replace(/\.?0+$/, '') + suffixes[tier];
    }
    const PAYMENT_ADDRESS = '0x7efCa6129eAFD3FAFf3134D74d3cA04ab2894983';
    const PAYPAL_EMAIL = 'mrliamc90@gmail.com';
    const POLYGON_ICON_URL = 'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/2406-removebg-preview.png';
    const PAYPAL_ICON_URL = 'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/2409-removebg-preview.png';
    let LIVE_POL_RATE_GBP = 0.16;
    let lastRateUpdate = null;
    const RPC_ENDPOINTS = ['https://polygon-rpc.com','https://rpc-mainnet.maticvigil.com','https://rpc-mainnet.matic.network','https://rpc-mainnet.matic.quiknode.pro','https://polygon-rpc.com/'];

    // ============ TRANSACTION TRACKING ============
    function getUsedTransactions() { const used = localStorage.getItem('pawsOfDestiny_usedTransactions'); return used ? JSON.parse(used) : []; }
    function addUsedTransaction(txId) { const used = getUsedTransactions(); used.push(txId); localStorage.setItem('pawsOfDestiny_usedTransactions', JSON.stringify(used)); }
    function isTransactionUsed(txId) { const used = getUsedTransactions(); return used.includes(txId); }

    // ============ THEMED NOTIFICATION SYSTEM ============
    function showGameNotification(message, detail = '', isSuccess = false) { const existing = document.querySelector('.game-notification'); if (existing) existing.remove(); const notif = document.createElement('div'); notif.className = 'game-notification' + (isSuccess ? ' success' : ''); notif.innerHTML = `<div class="notif-icon">${isSuccess ? '✅' : '🐾'}</div><div class="notif-message">${message}</div>${detail ? `<div class="notif-detail">${detail}</div>` : ''}<button id="closeNotifBtn">OK</button>`; document.body.appendChild(notif); document.getElementById('closeNotifBtn').addEventListener('click', () => { notif.remove(); }); setTimeout(() => { if (document.body.contains(notif)) notif.remove(); }, 5000); }
    function showNotEnoughBones(shortfall, cost, upgradeName) { showGameNotification('🦴 Not Enough Bones!', `You need ${formatNum(cost)} bones for ${upgradeName}.\nYou're short by ${formatNum(shortfall)} bones.\n\nKeep tapping to earn more!`); }
    function showNotEnoughForAny(upgradeName) { showGameNotification('🦴 Not Enough Bones!', `You don't have enough bones for any ${upgradeName} upgrade.\n\nKeep tapping to earn more!`); }

    // ============ LIVE PRICE FETCHER (runs continuously) ============
    async function fetchLivePolygonRate() { try { const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=polygon-ecosystem-token&vs_currencies=gbp', { headers: { 'Accept': 'application/json' } }); if (response.ok) { const data = await response.json(); if (data['polygon-ecosystem-token']?.gbp) { LIVE_POL_RATE_GBP = data['polygon-ecosystem-token'].gbp; lastRateUpdate = new Date(); return true; } } const binanceResponse = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=POLGBP', { headers: { 'Accept': 'application/json' } }); if (binanceResponse.ok) { const binanceData = await binanceResponse.json(); if (binanceData.price) { LIVE_POL_RATE_GBP = parseFloat(binanceData.price); lastRateUpdate = new Date(); return true; } } } catch (error) {} return false; }
    function gbpToPolygon(gbp) { if (LIVE_POL_RATE_GBP <= 0) return '0.00'; return (gbp / LIVE_POL_RATE_GBP).toFixed(2); }
    function getRateDisplayText() { if (lastRateUpdate) { const secondsAgo = Math.floor((new Date() - lastRateUpdate) / 1000); if (secondsAgo < 60) return `Live • Updated ${secondsAgo}s ago`; if (secondsAgo < 3600) return `Live • Updated ${Math.floor(secondsAgo/60)}m ago`; return `Live • Updated ${Math.floor(secondsAgo/3600)}h ago`; } return 'Using cached rate'; }

    // ============ GRANT MULTIPLIER ============
    function grantMultiplierForTier(tier, tierId, txId, method) { if (!state.tierPurchases[tierId]) state.tierPurchases[tierId] = 0; state.shopMultiplierOwned += tier.multiplier; state.tierPurchases[tierId]++; addUsedTransaction(txId); saveCurrentProfile(); return { success: true, message: `✅ Payment Verified via ${method}!\n\nTransaction: ${txId.slice(0,10)}...${txId.slice(-6)}\n\n${tier.name} activated!\n+x${tier.multiplier} multiplier added!\n\nTotal multiplier: x${getTotalMultiplier()}` }; }

    // ============ PAYMENT MODALS ============
    function showPolygonPaymentModal(tierId) { const tier = state.shopTiers.find(t => t.id === tierId); if (!tier) return; const polAmount = gbpToPolygon(tier.price); const existingModal = document.querySelector('.payment-modal'); if (existingModal) existingModal.remove(); const modal = document.createElement('div'); modal.className = 'payment-modal'; modal.innerHTML = `<div class="payment-modal-content"><h3><img src="${POLYGON_ICON_URL}" class="polygon-icon" alt="POL" /> Polygon Payment</h3><p>${tier.name} - x${tier.multiplier} Multiplier</p><div class="amount-display">£${tier.price.toFixed(2)} = ${polAmount} POL</div><p style="font-size:0.7rem;color:#888;">Rate: £${LIVE_POL_RATE_GBP.toFixed(4)}/POL (Live)</p><p style="font-size:0.8rem;color:#ff4444;">⚠️ Send EXACTLY ${polAmount} POL</p><p style="font-size:0.8rem;color:#888;">To address:</p><div class="address-copy" id="copyAddress" title="Click to copy">${PAYMENT_ADDRESS}</div><p style="font-size:0.7rem;color:#888;margin:5px 0;">Click to copy • Polygon Network Only</p><p style="font-size:0.7rem;color:#ffd700;">After sending, paste transaction hash:</p><input class="input-field" id="txHashInput" placeholder="0x... transaction hash" style="margin:5px 0;font-size:0.8rem;" /><div class="status-text" id="statusText"></div><button class="verify-btn" id="verifyPolygonBtn">🔍 Verify Payment</button><p style="font-size:0.65rem;color:#888;margin-top:5px;">Transaction hashes cannot be reused</p><button class="close-btn" id="closeModalBtn">❌ Cancel</button></div>`; document.body.appendChild(modal); document.getElementById('copyAddress').addEventListener('click', function() { navigator.clipboard.writeText(PAYMENT_ADDRESS).then(() => { this.style.background = '#1a3a1a'; this.textContent = '✅ Address Copied!'; setTimeout(() => { this.style.background = '#111'; this.textContent = PAYMENT_ADDRESS; }, 2000); }).catch(() => { this.style.background = '#1a3a1a'; this.textContent = '📋 Copy manually: ' + PAYMENT_ADDRESS; }); }); document.getElementById('verifyPolygonBtn').addEventListener('click', async function() { const txHash = document.getElementById('txHashInput').value.trim(); const statusText = document.getElementById('statusText'); const verifyBtn = document.getElementById('verifyPolygonBtn'); if (!txHash || !txHash.startsWith('0x')) { statusText.textContent = '⚠️ Invalid hash (must start with 0x)'; statusText.className = 'status-text error'; return; } if (isTransactionUsed(txHash)) { statusText.textContent = '❌ This transaction has already been used!'; statusText.className = 'status-text error'; return; } statusText.textContent = '🔍 Verifying on Polygon blockchain...'; statusText.className = 'status-text verifying'; verifyBtn.disabled = true; verifyBtn.textContent = '⏳ Verifying...'; let verified = false; let actualAmount = null; for (const endpoint of RPC_ENDPOINTS) { try { const controller = new AbortController(); const timeoutId = setTimeout(() => controller.abort(), 10000); const response = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ jsonrpc: '2.0', method: 'eth_getTransactionReceipt', params: [txHash], id: 1 }), signal: controller.signal }); clearTimeout(timeoutId); const data = await response.json(); if (data.result && data.result.status === '0x1' && data.result.to && data.result.to.toLowerCase() === PAYMENT_ADDRESS.toLowerCase()) { const txResponse = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ jsonrpc: '2.0', method: 'eth_getTransactionByHash', params: [txHash], id: 1 }) }); const txData = await txResponse.json(); if (txData.result && txData.result.value) { actualAmount = Number(BigInt(txData.result.value)) / 1e18; verified = true; break; } } } catch (e) {} } if (verified && actualAmount !== null) { const expectedPOL = parseFloat(polAmount); if (actualAmount >= expectedPOL * 0.99) { const result = grantMultiplierForTier(tier, tierId, txHash, 'Polygo     // Auto-load on startup from localStorage
    function autoLoadLatestProfile() {
      const profiles = getAllProfiles();
      const profileIds = Object.keys(profiles);
      if (profileIds.length > 0) {
        // Find the most recently saved profile
        let latestProfile = null;
        let latestTime = 0;
        profileIds.forEach(id => {
          const profile = profiles[id];
          const saveTime = profile.lastSaved ? new Date(profile.lastSaved).getTime() : 0;
          if (saveTime > latestTime) {
            latestTime = saveTime;
            latestProfile = id;
          }
        });
        if (latestProfile) {
          loadProfile(latestProfile);
          state.screen = 'main';
          return true;
        }
      }
      return false;
    }

    // ============ STATS & MULTIPLIERS ============
    function getEffectiveStats() { if(!state.breedStats)return{health:0,strength:0,attack:0,defence:0}; return{health:state.breedStats.health+state.prestigeOwned,strength:state.breedStats.strength+state.prestigeOwned,attack:state.breedStats.attack+state.prestigeOwned,defence:state.breedStats.defence+state.prestigeOwned}; }
    function getTotalMultiplier() { return (state.prestigeOwned + 1) + state.shopMultiplierOwned; }

    // ============ UPGRADE CALCULATIONS ============
    function getTapPowerCost() { return 25 * (state.tapPowerOwned + 1); }
    function getAutoCollectorCost() { return 40 + (15 * state.autoCollectorOwned); }
    function getPrestigeCost(c) { return 500 * Math.pow(2, c); }
    function getNextPrestigeCost() { return 500 * Math.pow(2, state.prestigeOwned); }
    function calculateMaxTapUpgrades() { let a=0,t=0,r=state.bones,c=state.tapPowerOwned; while(true){const cost=25*(c+1);if(r>=cost){r-=cost;t+=cost;a++;c++;}else break;} return{count:a,totalCost:t}; }
    function calculateMaxAutoUpgrades() { let a=0,t=0,r=state.bones,c=state.autoCollectorOwned; while(true){const cost=40+(15*c);if(r>=cost){r-=cost;t+=cost;a++;c++;}else break;} return{count:a,totalCost:t}; }
    function calculateMaxPrestiges() { let a=0,t=0,r=state.bones,c=state.prestigeOwned; while(true){const cost=getPrestigeCost(c);if(r>=cost){r-=cost;t+=cost;a++;c++;}else break;} return{count:a,totalCost:t}; }
    function performPrestige() { state.prestigeOwned++; state.tapPowerOwned=0; state.autoCollectorOwned=0; state.tapPower=1; state.autoCollector=0; state.totalTaps=0; state.level=1; state.exp=0; state.expToNextLevel=getExpForLevel(1); }

    function attackWorldBoss() { const damage = state.tapPower * getTotalMultiplier() * 10; state.worldBossHP -= damage; if (state.worldBossHP <= 0) { const reward = state.worldBossMaxHP * 2; state.bones += reward; state.worldBossMaxHP = Math.floor(state.worldBossMaxHP * 1.5); state.worldBossHP = state.worldBossMaxHP; updateBoneDisplay(); saveCurrentProfile(); showGameNotification('🎉 World Boss Defeated!', `Reward: ${formatNum(reward)} 🦴\nNew boss: ${formatNum(state.worldBossMaxHP)} HP`, true); } renderWorldBossTab(); }
    function renderWorldBossTab() { const c=document.getElementById('tabContent'); if(!c)return; const hpPercent = Math.max(0, (state.worldBossHP / state.worldBossMaxHP) * 100); c.innerHTML = `<div style="color:#fff;"><h3 style="color:#ffd700;">🐉 World Boss</h3><div class="boss-card"><h4 style="color:#f66;">🗡️ The Bone Collector</h4><p style="font-size:0.8rem;color:#888;">A massive beast terrorizing the dog park!</p><div class="boss-hp-bar"><div class="boss-hp-fill" style="width:${hpPercent}%;"></div></div><p style="font-size:0.8rem;">HP: ${formatNum(Math.max(0,state.worldBossHP))} / ${formatNum(state.worldBossMaxHP)}</p><p style="font-size:0.7rem;color:#888;">Your damage: ${formatNum(state.tapPower * getTotalMultiplier() * 10)} per hit</p><button id="attackBossBtn" style="width:100%;margin-top:10px;">⚔️ Attack Boss</button><p style="font-size:0.7rem;color:#ffd700;margin-top:5px;">Defeat reward: ${formatNum(state.worldBossMaxHP * 2)} 🦴</p></div><p style="color:#888;font-size:0.7rem;text-align:center;">Boss gets stronger after each defeat!</p></div>`; document.getElementById('attackBossBtn').addEventListener('click', attackWorldBoss); }
    function renderArenaTab() { const c=document.getElementById('tabContent'); if(!c)return; const opponents = [{name:'Rex the Rottweiler',power:50,reward:100},{name:'Luna the Labrador',power:120,reward:250},{name:'Max the Mastiff',power:250,reward:500},{name:'Bella the Boxer',power:500,reward:1000}]; let html = `<div style="color:#fff;"><h3 style="color:#ffd700;">🏟️ PvP Arena</h3><p style="font-size:0.8rem;color:#888;margin-bottom:10px;">Fight other dogs for glory and bones!</p>`; opponents.forEach(opp => { const winChance = Math.min(95, Math.floor((state.tapPower * getTotalMultiplier() / opp.power) * 50)); html += `<div class="arena-opponent"><div><strong>${opp.name}</strong><p style="font-size:0.7rem;color:#888;">Power: ${formatNum(opp.power)} | Win Rate: ${winChance}%</p></div><button class="fight-arena-btn" data-reward="${opp.reward}" data-power="${opp.power}">⚔️ Fight</button></div>`; }); html += `<p style="color:#ffd700;margin-top:10px;">🏆 Arena Wins: ${formatNum(state.arenaWins)}</p></div>`; c.innerHTML = html; document.querySelectorAll('.fight-arena-btn').forEach(btn => { btn.addEventListener('click', function() { const reward = parseInt(this.dataset.reward), power = parseInt(this.dataset.power); const winChance = Math.min(95, Math.floor((state.tapPower * getTotalMultiplier() / power) * 50)); if (Math.random() * 100 < winChance) { state.bones += reward; state.arenaWins++; updateBoneDisplay(); saveCurrentProfile(); showGameNotification('🏆 Victory!', `You won!\n+${formatNum(reward)} 🦴`, true); } else { showGameNotification('💀 Defeat!', 'You lost. Train harder!'); } renderArenaTab(); }); }); }
    function renderHowToPlayTab() { const c=document.getElementById('tabContent'); if(!c)return; c.innerHTML = `<div style="color:#fff;"><h3 style="color:#ffd700;">📖 How to Play</h3><div style="background:#0a0a0a;border-radius:15px;padding:12px;margin:8px 0;border:1px solid #333;"><h4 style="color:#ffd700;">🐾 Getting Started</h4><p style="font-size:0.8rem;">Choose your breed, enter a name, and start tapping!</p></div><div style="background:#0a0a0a;border-radius:15px;padding:12px;margin:8px 0;border:1px solid #333;"><h4 style="color:#ffd700;">💾 Auto-Save</h4><p style="font-size:0.8rem;">Game auto-saves every 5 seconds and loads automatically across any browser!</p></div></div>`; }
    function renderAboutGameTab() { const c=document.getElementById('tabContent'); if(!c)return; c.innerHTML = `<div style="color:#fff;"><h3 style="color:#ffd700;">ℹ️ About Paws of Destiny</h3><div style="background:#0a0a0a;border-radius:15px;padding:16px;margin:10px 0;border:1px solid #333;text-align:center;"><p style="font-size:1.2rem;color:#ffd700;">🐾 Paws of Destiny</p><p style="font-size:0.7rem;color:#8247e5;margin-top:15px;"><img src="${POLYGON_ICON_URL}" class="polygon-icon-sm" alt="POL" /> Powered by Polygon Network</p></div></div>`; }

    // ============ HELPERS ============
    function getTapImages() { return state.breedTapImages[state.breed] || state.defaultTapImages; }
    function getExpForLevel(l) { return Math.floor(100 * Math.pow(1.5, l - 1)); }
    function addExp(amount) { state.exp += amount * getTotalMultiplier(); while (state.exp >= state.expToNextLevel) { state.exp -= state.expToNextLevel; state.level++; state.expToNextLevel = getExpForLevel(state.level); } updateExpBar(); }
    function updateExpBar() { const ef=document.getElementById('expFill'),et=document.getElementById('expText'),ld=document.getElementById('levelDisplay'); if(ef) ef.style.width=(state.exp/state.expToNextLevel*100)+'%'; if(et) et.textContent=`${formatNum(state.exp)} / ${formatNum(state.expToNextLevel)} EXP`; if(ld) ld.textContent=`⭐ Level ${formatNum(state.level)}`; }
    function updatePrestigeUnderTapper() { const el=document.getElementById('prestigeUnderTapper'); if(el) el.textContent=`⭐ Prestige ${formatNum(state.prestigeOwned)} owned`; }

    // ============ RENDER ============
    function renderLoginScreen() { const profiles=getAllProfiles(),ids=Object.keys(profiles); let h=`<div class="title-banner"><img src="${state.titleBannerUrl}" alt="Paws of Destiny"/></div><div class="screen active setup-centered" id="loginScreen"><h3 style="color:#ffd700;margin-bottom:15px;">🐾 Paws of Destiny</h3><p style="color:#cccccc;margin-bottom:20px;">Welcome back!</p>`; if(ids.length>0){h+=`<div style="width:100%;max-width:400px;">`;ids.forEach(id=>{const p=profiles[id];h+=`<div class="save-slot" data-profile="${id}"><h4>🐕 ${p.playerName}</h4><p>${p.breed} | Lvl ${formatNum(p.level)} | 🦴 ${formatNum(p.bones)}</p><p style="font-size:0.7rem;">${new Date(p.lastSaved).toLocaleDateString()}</p><button class="delete-profile-btn" data-profile="${id}" style="background:#440000;margin-top:6px;font-size:0.7rem;">🗑️ Delete</button></div>`;});h+=`</div>`;} else h+=`<p style="color:#888;margin:20px 0;">No profiles found.</p>`; h+=`<button class="start-btn" id="newProfileBtn" style="margin-top:20px;">✨ New Profile</button><button class="import-btn" id="importSaveBtn">📥 Import Save</button></div>`; appDiv.innerHTML=h; document.querySelectorAll('.save-slot').forEach(s=>{s.addEventListener('click',e=>{if(e.target.classList.contains('delete-profile-btn'))return;if(loadProfile(s.dataset.profile)){state.screen='main';renderMainGame();}});}); document.querySelectorAll('.delete-profile-btn').forEach(b=>{b.addEventListener('click',e=>{e.stopPropagation();if(confirm('Delete?'))deleteProfile(b.dataset.profile);});}); document.getElementById('newProfileBtn').addEventListener('click',()=>{ state.screen='setup';state.currentProfileId='profile_'+Date.now();state.playerName='';state.breed='';state.breedStats=null;state.bones=0;state.totalTaps=0;state.prestigeOwned=0;state.tapPowerOwned=0;state.autoCollectorOwned=0;state.tapPower=1;state.autoCollector=0;state.prestigeMultiplier=1;state.currentTapImage=0;state.level=1;state.exp=0;state.expToNextLevel=getExpForLevel(1);state.shopMultiplierOwned=0;state.tierPurchases={};state.worldBossHP=10000;state.worldBossMaxHP=10000;state.arenaWins=0;state.shopTiers.forEach(t=>{state.tierPurchases[t.id]=0;});renderSetup(); }); document.getElementById('importSaveBtn').addEventListener('click',importSaveFile); }
    function renderSetup() { let h=`<div class="title-banner"><img src="${state.titleBannerUrl}" alt="Paws of Destiny"/></div><div class="screen active setup-centered" id="setupScreen"><h3 style="color:#ffd700;margin-bottom:10px;">🐾 Choose Your Destiny</h3><input class="input-field" id="nameInput" placeholder="Enter your dog's name" value="${state.playerName}"/><p style="color:#cccccc;font-weight:bold;">Pick your breed:</p><div class="breed-grid" id="breedGrid">`; state.breedOptions.forEach(breed=>{ const bd=state.breedImages[breed],url=bd?.url||'',pos=bd?.position||'center 35%'; const style=url?`background-image:url('${url}');background-size:cover;background-position:${pos};`:''; const content=url?'':'🖼️<br>add image',stats=getBreedStats(breed); h+=`<div class="breed-card ${state.breed===breed?'selected':''}" data-breed="${breed}"><div class="breed-img-placeholder" style="${style}">${content}</div><div class="breed-name">${breed}</div><div class="breed-stats"><span>❤️${stats.health}</span><span>💪${stats.strength}</span><span>⚔️${stats.attack}</span><span>🛡️${stats.defence}</span></div></div>`; }); h+=`</div><button class="start-btn" id="startGameBtn">⚔️ Enter Paws of Destiny</button><button class="logout-btn" id="backToLoginBtn" style="margin-top:8px;">↩️ Back to Profiles</button></div>`; appDiv.innerHTML=h; document.getElementById('nameInput').addEventListener('input',e=>{state.playerName=e.target.value;}); document.querySelectorAll('.breed-card').forEach(c=>{c.addEventListener('click',()=>{state.breed=c.dataset.breed;state.breedStats=getBreedStats(state.breed);renderSetup();});}); document.getElementById('startGameBtn').addEventListener('click',()=>{if(!state.playerName.trim()){alert('Enter a name!');return;}if(!state.breed){alert('Select a breed!');return;}state.screen='main';saveCurrentProfile();renderMainGame();}); document.getElementById('backToLoginBtn').addEventListener('click',()=>{state.screen='login';renderLoginScreen();}); }
    function renderMainGame() { const imgs=getTapImages(),cur=imgs[Math.min(state.currentTapImage, imgs.length-1)],tm=getTotalMultiplier(); const isSmallBreed = state.breed === 'Japanese Akita' || state.breed === 'Chihuahua'; const tapperClass = isSmallBreed ? 'tap-area ' + (state.breed === 'Japanese Akita' ? 'akita-tapper' : 'chihuahua-tapper') : 'tap-area'; const gifClass = isSmallBreed ? 'tap-gif ' + (state.breed === 'Japanese Akita' ? 'akita-gif' : 'chihuahua-gif') : 'tap-gif'; let h=`<div class="title-banner"><img src="${state.titleBannerUrl}" alt="Paws of Destiny"/></div><div class="game-header"><h2>🐕 ${state.playerName}</h2><div class="resource-badge">🦴 <span id="boneDisplay">${formatNum(state.bones)}</span></div></div><div class="screen active" id="mainScreen"><div class="${tapperClass}" id="tapDog"><img src="${cur}" alt="Tap" class="${gifClass}" id="tapGif"/></div><div class="level-container"><div class="level-display" id="levelDisplay">⭐ Level ${formatNum(state.level)}</div><div class="exp-bar-bg"><div class="exp-bar-fill" id="expFill" style="width:${(state.exp/state.expToNextLevel)*100}%;"></div></div><div class="exp-text" id="expText">${formatNum(state.exp)} / ${formatNum(state.expToNextLevel)} EXP (x${tm})</div></div><div class="prestige-under-tapper" id="prestigeUnderTapper">⭐ Prestige ${formatNum(state.prestigeOwned)} owned</div><div class="stat-row"><span>${state.breed}</span></div><div class="tab-row"><div class="tab active" data-tab="profile">🐶 Profile</div><div class="tab" data-tab="upgrades">📈 Upgrades</div><div class="tab" data-tab="prestige">🌟 Prestige</div><div class="tab" data-tab="worldboss">🐉 Boss</div><div class="tab" data-tab="arena">🏟️ Arena</div><div class="tab" data-tab="shop">🛒 Shop</div><div class="tab" data-tab="howtoplay">📖 How to Play</div><div class="tab" data-tab="about">ℹ️ About</div></div><div id="tabContent"></div></div>`; appDiv.innerHTML=h; document.getElementById('tapDog').addEventListener('click',handleTap); attachTabEvents();renderProfileTab();startAutoCollector(); }
    function handleTap(){const tm=getTotalMultiplier();state.bones+=state.tapPower*tm;state.totalTaps++;addExp(state.tapPower);updateBoneDisplay();cycleToNextImage();if(state.tabActive==='upgrades')renderUpgradesTab();else if(state.tabActive==='profile')renderProfileTab();else if(state.tabActive==='prestige')renderPrestigeTab();else if(state.tabActive==='worldboss')renderWorldBossTab();}
    function cycleToNextImage(){const imgs=getTapImages();state.currentTapImage=(state.currentTapImage+1)%imgs.length;const g=document.getElementById('tapGif');if(g)g.src=imgs[state.currentTapImage];}
    function updateBoneDisplay(){const b=document.getElementById('boneDisplay');if(b)b.textContent=formatNum(state.bones);}
    let autoInterval; function startAutoCollector(){if(autoInterval)clearInterval(autoInterval);autoInterval=setInterval(()=>{if(state.autoCollector>0){const tm=getTotalMultiplier();state.bones+=state.autoCollector*tm;addExp(state.autoCollector);updateBoneDisplay();if(state.tabActive==='upgrades')renderUpgradesTab();else if(state.tabActive==='prestige')renderPrestigeTab();else if(state.tabActive==='worldboss')renderWorldBossTab();}},1000);}
    state.tabActive='profile'; function attachTabEvents(){document.querySelectorAll('.tab').forEach(t=>{t.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');state.tabActive=t.dataset.tab;switch(state.tabActive){case'profile':renderProfileTab();break;case'upgrades':renderUpgradesTab();break;case'prestige':renderPrestigeTab();break;case'worldboss':renderWorldBossTab();break;case'arena':renderArenaTab();break;case'shop':renderShopTab();break;case'howtoplay':renderHowToPlayTab();break;case'about':renderAboutGameTab();break;}});});}
    function renderProfileTab(){ const c=document.getElementById('tabContent');if(!c)return; const stats=getEffectiveStats(),tm=getTotalMultiplier(); c.innerHTML=`<div style="color:#fff;padding:10px;"><h3 style="color:#ffd700;">🐾 ${state.playerName}</h3><p><strong>Breed:</strong> ${state.breed}</p><div class="stats-grid"><div class="stat-box"><div class="stat-label">❤️ Health</div><div class="stat-value">${stats.health}</div></div><div class="stat-box"><div class="stat-label">💪 Strength</div><div class="stat-value">${stats.strength}</div></div><div class="stat-box"><div class="stat-label">⚔️ Attack</div><div class="stat-value">${stats.attack}</div></div><div class="stat-box"><div class="stat-label">🛡️ Defence</div><div class="stat-value">${stats.defence}</div></div></div><p><strong>Level:</strong> ${formatNum(state.level)} | <strong>Prestige:</strong> ${formatNum(state.prestigeOwned)}</p><p>⭐ EXP: ${formatNum(state.exp)}/${formatNum(state.expToNextLevel)}</p><p>🦴 Bones: ${formatNum(state.bones)}</p><p>⚡ Tap: ${formatNum(state.tapPower)} | 🕒 Auto: ${formatNum(state.autoCollector)}/s</p><p>🌟 Total Multiplier: x${tm} (Prestige: +${state.prestigeOwned}x | Shop: +${formatNum(state.shopMultiplierOwned)}x)</p><button id="downloadSaveBtn" style="margin-top:10px;width:100%;">💾 Download Save</button><button id="logoutBtn" class="logout-btn" style="margin-top:8px;width:100%;">🚪 Logout</button></div>`; document.getElementById('downloadSaveBtn').addEventListener('click',downloadSaveFile); document.getElementById('logoutBtn').addEventListener('click',logout); }
    function renderUpgradesTab(){ const c=document.getElementById('tabContent');if(!c)return; const tc=getTapPowerCost(),ac=getAutoCollectorCost(),mt=calculateMaxTapUpgrades(),ma=calculateMaxAutoUpgrades(); c.innerHTML=`<div class="upgrade-item"><div class="upgrade-info"><span>💪 Tap Power +1</span><span>Cost: ${formatNum(tc)} 🦴</span></div><p class="next-cost">Owned: ${formatNum(state.tapPowerOwned)} | Max: ${mt.count} (${formatNum(mt.totalCost)} 🦴)</p><div class="upgrade-buttons"><button id="upgradeTapBtn">Buy 1</button><button id="maxTapBtn" class="max-buy-btn">Max (${mt.count})</button></div></div><div class="upgrade-item"><div class="upgrade-info"><span>🕒 Auto Collector +1/s</span><span>Cost: ${formatNum(ac)} 🦴</span></div><p class="next-cost">Owned: ${formatNum(state.autoCollectorOwned)} | Max: ${ma.count} (${formatNum(ma.totalCost)} 🦴)</p><div class="upgrade-buttons"><button id="upgradeAutoBtn">Buy 1</button><button id="maxAutoBtn" class="max-buy-btn">Max (${ma.count})</button></div></div><p style="color:#ccc;margin-top:10px;">Tap: ${formatNum(state.tapPower)} | Auto: ${formatNum(state.autoCollector)}/s | 🦴 ${formatNum(state.bones)}</p>`; document.getElementById('upgradeTapBtn').addEventListener('click',()=>{const p=getTapPowerCost();if(state.bones>=p){state.bones-=p;state.tapPowerOwned++;state.tapPower++;updateBoneDisplay();renderUpgradesTab();}else{showNotEnoughBones(p-state.bones,p,'Tap Power');}}); document.getElementById('maxTapBtn').addEventListener('click',()=>{const m=calculateMaxTapUpgrades();if(m.count>0){state.bones-=m.totalCost;state.tapPowerOwned+=m.count;state.tapPower+=m.count;updateBoneDisplay();renderUpgradesTab();}else{showNotEnoughForAny('Tap Power');}}); document.getElementById('upgradeAutoBtn').addEventListener('click',()=>{const p=getAutoCollectorCost();if(state.bones>=p){state.bones-=p;state.autoCollectorOwned++;state.autoCollector++;updateBoneDisplay();renderUpgradesTab();}else{showNotEnoughBones(p-state.bones,p,'Auto Collector');}}); document.getElementById('maxAutoBtn').addEventListener('click',()=>{const m=calculateMaxAutoUpgrades();if(m.count>0){state.bones-=m.totalCost;state.autoCollectorOwned+=m.count;state.autoCollector+=m.count;updateBoneDisplay();renderUpgradesTab();}else{showNotEnoughForAny('Auto Collector');}}); }
    function renderPrestigeTab(){ const c=document.getElementById('tabContent');if(!c)return; const nc=getNextPrestigeCost(),mp=calculateMaxPrestiges(),cam=mp.count>0?getPrestigeCost(state.prestigeOwned+mp.count):nc,tm=getTotalMultiplier(),mam=tm+mp.count; c.innerHTML=`<div class="prestige-item"><div class="prestige-info"><span>🌟 Prestige</span><span>Next: ${formatNum(nc)} 🦴</span></div><p class="next-cost">Owned: ${formatNum(state.prestigeOwned)} | Max: ${mp.count} (${formatNum(mp.totalCost)} 🦴)</p><p class="next-cost">Multiplier: x${tm}</p>${mp.count>0?`<p class="cost-breakdown">After max: ${formatNum(state.prestigeOwned+mp.count)} owned | x${mam} | Next: ${formatNum(cam)} 🦴</p>`:''}<div class="prestige-buttons"><button id="maxPrestigeBtn" class="max-buy-btn" ${mp.count===0?'disabled':''}>Max (${mp.count})</button></div>${mp.count===0?`<p style="color:#f44;font-size:0.8rem;margin-top:5px;">Need ${formatNum(nc-state.bones)} more 🦴</p>`:''}</div><p style="color:#ccc;margin-top:10px;">Resets level & upgrades. Keeps multipliers & stats.</p><p style="color:#ffd700;font-size:0.8rem;">+1x multiplier, +1 stats per prestige!</p>`; document.getElementById('maxPrestigeBtn').addEventListener('click',()=>{const m=calculateMaxPrestiges();if(m.count>0){state.bones-=m.totalCost;for(let i=0;i<m.count;i++)performPrestige();updateBoneDisplay();updateExpBar();updatePrestigeUnderTapper();saveCurrentProfile();renderPrestigeTab();showGameNotification('🌟 Prestige Complete!',`${m.count} prestiges done!\nMultiplier now x${getTotalMultiplier()}`,true);}}); }
    function renderShopTab(){ const c=document.getElementById('tabContent');if(!c)return; const rateDisplay = getRateDisplayText(); let h=`<div style="color:#fff;"><h3 style="color:#ffd700;margin-bottom:5px;">🛒 Shop</h3><div class="polygon-rate"><span class="live-dot"></span> Live POL Rate: £${LIVE_POL_RATE_GBP.toFixed(4)}/POL • ${rateDisplay}</div><p style="color:#ccc;font-size:0.7rem;margin-bottom:5px;">Polygon: ${PAYMENT_ADDRESS.slice(0,6)}...${PAYMENT_ADDRESS.slice(-4)} | PayPal: ${PAYPAL_EMAIL}</p><p style="color:#ff4444;font-size:0.7rem;margin-bottom:10px;">⚠️ Send exact amount • Transaction IDs cannot be reused</p>`; state.shopTiers.forEach((tier,i)=>{ const pc=state.tierPurchases[tier.id]||0,total=pc*tier.multiplier,bv=i===4,feat=i===2; let cls='shop-tier';if(bv)cls+=' best-value';else if(feat)cls+=' featured'; h+=`<div class="${cls}">${bv?'<div class="best-value-badge">BEST VALUE</div>':(feat?'<div class="tier-badge">POPULAR</div>':'')}<div class="tier-header">T${tier.id}: ${tier.name}</div><div class="tier-multiplier">+x${tier.multiplier}</div><div class="tier-price">£${tier.price.toFixed(2)}</div><div class="tier-polygon-price"><img src="${POLYGON_ICON_URL}" class="polygon-icon-sm" alt="POL" /> ${gbpToPolygon(tier.price)} POL</div>${pc>0?`<div class="tier-owned-count">📦 ${pc}x | Total: +${total}x</div>`:''}<div class="tier-value">${tier.value}</div><button class="buy-tier-btn" id="polygonBtn${tier.id}"><img src="${POLYGON_ICON_URL}" class="polygon-icon-sm" alt="POL" /> Pay with POL</button><button class="buy-tier-btn paypal" id="paypalBtn${tier.id}"><img src="${PAYPAL_ICON_URL}" class="paypal-icon-sm" alt="PayPal" /> Pay with PayPal</button></div>`; }); h+=`<p style="color:#888;font-size:0.7rem;margin-top:10px;text-align:center;">🔒 Real payments • Transaction verification • No reuse</p></div>`; c.innerHTML=h; state.shopTiers.forEach(tier=>{ document.getElementById('polygonBtn'+tier.id)?.addEventListener('click',()=>showPolygonPaymentModal(tier.id)); document.getElementById('paypalBtn'+tier.id)?.addEventListener('click',()=>showPaypalPaymentModal(tier.id)); }); }

    const appDiv=document.getElementById('app');
    document.getElementById('importFileInput').addEventListener('change',handleFileImport);
    
    // ============ STARTUP: Auto-load or show login ============
    if (!autoLoadLatestProfile()) {
      renderLoginScreen();
    } else {
      renderMainGame();
    }
    
    // ============ AUTO-SAVE EVERY 5 SECONDS ============
    setInterval(autoSave, 5000);
    
    // ============ LIVE RATE UPDATES EVERY 60 SECONDS ============
    fetchLivePolygonRate().then(() => { console.log('Initial POL rate: £' + LIVE_POL_RATE_GBP); });
    setInterval(() => { fetchLivePolygonRate(); }, 60000);
  })();
</script>
