<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Paws of Destiny · Idle Dog RPG</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Arial', sans-serif;
    }

    body {
      background: #000000;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
    }

    .game-container {
      max-width: 500px;
      width: 100%;
      background: #000000;
      border-radius: 0;
      box-shadow: none;
      overflow: hidden;
      border: none;
    }

    .title-banner {
      width: 100%;
      padding: 8px 0;
      background: #000000;
      border-bottom: 1px solid #222222;
    }
    .title-banner img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
    }

    .game-header {
      background: #000000;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #222222;
    }
    .game-header h2 {
      color: #ffffff;
      font-weight: 800;
      letter-spacing: 2px;
      font-size: 1rem;
      text-shadow: 0 2px 4px black;
    }
    .resource-badge {
      background: #111111;
      padding: 6px 16px;
      border-radius: 30px;
      color: #ffd700;
      font-weight: bold;
      border: 1px solid #333333;
      font-size: 0.9rem;
    }

    .screen {
      display: none;
      padding: 16px;
      background: #000000;
      min-height: 500px;
    }
    .screen.active {
      display: block;
    }

    .setup-centered {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .breed-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 15px;
      width: 100%;
      max-width: 400px;
    }
    .breed-card {
      background: #0a0a0a;
      border-radius: 24px;
      padding: 12px;
      text-align: center;
      border: 2px solid #222222;
      cursor: pointer;
      transition: all 0.2s;
      color: #cccccc;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .breed-card.selected {
      border: 3px solid #ffd700;
      background: #111111;
      box-shadow: 0 0 18px #ffd700;
    }
    
    .breed-img-placeholder {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #0a0a0a;
      border-radius: 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888888;
      font-size: 0.75rem;
      background-size: cover;
      background-position: center 35%;
      border: 1px dashed #333333;
      overflow: hidden;
    }
    
    .breed-name {
      font-weight: bold;
      font-size: 0.8rem;
      text-transform: uppercase;
      margin-top: 4px;
      color: #ffffff;
    }

    .breed-stats {
      font-size: 0.65rem;
      color: #ffd700;
      margin-top: 4px;
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .input-field {
      width: 100%;
      max-width: 400px;
      padding: 14px;
      border-radius: 30px;
      border: 2px solid #333333;
      background: #0a0a0a;
      color: #ffffff;
      font-weight: bold;
      margin: 12px 0;
      outline: none;
      font-size: 1rem;
    }
    .input-field::placeholder {
      color: #888888;
    }
    .start-btn {
      background: #ffd700;
      border: none;
      padding: 16px;
      width: 100%;
      max-width: 400px;
      border-radius: 40px;
      font-weight: bold;
      font-size: 1.2rem;
      color: #000000;
      margin-top: 10px;
      cursor: pointer;
      border-bottom: 4px solid #cc9900;
    }

    .import-btn {
      background: #444444;
      border: none;
      padding: 12px;
      width: 100%;
      max-width: 400px;
      border-radius: 40px;
      font-weight: bold;
      font-size: 1rem;
      color: #ffffff;
      margin-top: 8px;
      cursor: pointer;
      border-bottom: 3px solid #666666;
    }
    .import-btn:hover {
      background: #555555;
    }

    .tap-area {
      background: transparent;
      width: 200px;
      height: 200px;
      margin: 20px auto 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      overflow: hidden;
      position: relative;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      outline: none;
    }
    .tap-area:active,
    .tap-area:focus,
    .tap-area:focus-visible {
      outline: none;
      background: transparent;
      -webkit-tap-highlight-color: transparent;
    }
    .tap-gif {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 0;
      pointer-events: none;
    }

    .level-container {
      margin: 0 auto 16px;
      max-width: 300px;
      text-align: center;
    }
    .level-display {
      color: #ffd700;
      font-weight: bold;
      font-size: 0.9rem;
      margin-bottom: 4px;
    }
    .exp-bar-bg {
      background: #111111;
      height: 12px;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #333333;
      margin-bottom: 2px;
    }
    .exp-bar-fill {
      height: 100%;
      border-radius: 6px;
      background: linear-gradient(90deg, #ffd700, #ffaa00);
      transition: width 0.3s ease;
    }
    .exp-text {
      color: #888888;
      font-size: 0.7rem;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      color: #ffffff;
      font-weight: bold;
      margin: 8px 0;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin: 8px 0;
    }
    .stat-box {
      background: #0a0a0a;
      border-radius: 10px;
      padding: 8px;
      text-align: center;
      border: 1px solid #222222;
    }
    .stat-box .stat-label {
      font-size: 0.7rem;
      color: #888888;
    }
    .stat-box .stat-value {
      font-size: 1rem;
      font-weight: bold;
      color: #ffd700;
    }

    .tab-row {
      display: flex;
      gap: 6px;
      margin-top: 14px;
    }
    .tab {
      flex: 1;
      background: #0a0a0a;
      padding: 10px 4px;
      text-align: center;
      border-radius: 20px 20px 0 0;
      font-weight: bold;
      color: #888888;
      cursor: pointer;
      border: 1px solid #222222;
      border-bottom: none;
      font-size: 0.7rem;
    }
    .tab.active {
      background: #000000;
      color: #ffd700;
      border-bottom: 2px solid #ffd700;
    }

    .upgrade-item, .prestige-item {
      background: #0a0a0a;
      border-radius: 20px;
      padding: 12px;
      margin: 10px 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border: 1px solid #222222;
      color: #ffffff;
    }
    .upgrade-info, .prestige-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .upgrade-buttons, .prestige-buttons {
      display: flex;
      gap: 8px;
    }
    .upgrade-buttons button, .prestige-buttons button {
      flex: 1;
      font-size: 0.75rem;
      padding: 8px 10px;
    }
    .max-buy-btn {
      background: #ffd700;
      color: #000000;
      border-bottom-color: #cc9900;
    }
    .max-buy-btn:hover {
      background: #ffed4a;
    }
    button {
      background: #222222;
      border: none;
      color: #ffffff;
      font-weight: bold;
      padding: 10px 16px;
      border-radius: 30px;
      cursor: pointer;
      border-bottom: 3px solid #444444;
    }
    button:hover { background: #333333; }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Shop tier cards */
    .shop-tier {
      background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
      border-radius: 20px;
      padding: 16px;
      margin: 10px 0;
      border: 1px solid #333333;
      color: #ffffff;
      position: relative;
      overflow: hidden;
    }
    .shop-tier.featured {
      border: 2px solid #ffd700;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }
    .shop-tier.best-value {
      border: 2px solid #ffd700;
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
      background: linear-gradient(145deg, #222200, #0a0a00);
    }
    .tier-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #ffd700;
      color: #000000;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: bold;
    }
    .best-value-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #ffd700;
      color: #000000;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: bold;
      animation: glow 2s ease-in-out infinite;
    }
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 5px #ffd700; }
      50% { box-shadow: 0 0 20px #ffd700; }
    }
    .tier-header {
      font-size: 1.1rem;
      font-weight: bold;
      color: #ffd700;
      margin-bottom: 4px;
    }
    .tier-multiplier {
      font-size: 1.4rem;
      font-weight: bold;
      color: #ffffff;
    }
    .tier-price {
      font-size: 1.1rem;
      color: #ffd700;
      margin: 4px 0;
    }
    .tier-polygon-price {
      font-size: 0.9rem;
      color: #8247e5;
      margin-bottom: 4px;
      font-weight: bold;
    }
    .tier-owned-count {
      font-size: 0.8rem;
      color: #ffd700;
      margin-bottom: 4px;
    }
    .tier-value {
      font-size: 0.75rem;
      color: #888888;
      margin-bottom: 8px;
    }
    .polygon-rate {
      font-size: 0.7rem;
      color: #8247e5;
      margin-bottom: 6px;
    }
    .buy-tier-btn {
      width: 100%;
      background: #ffd700;
      color: #000000;
      font-weight: bold;
      padding: 12px;
      border-radius: 25px;
      border: none;
      cursor: pointer;
      border-bottom: 3px solid #cc9900;
      font-size: 0.9rem;
    }
    .buy-tier-btn:hover {
      background: #ffed4a;
    }
    .payment-options {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }
    .payment-btn {
      flex: 1;
      font-size: 0.7rem;
      padding: 8px 6px;
      background: #333333;
      border-radius: 15px;
      border: none;
      color: #ffffff;
      cursor: pointer;
      border-bottom: 2px solid #555555;
    }
    .payment-btn.polygon-btn {
      background: #8247e5;
      border-bottom-color: #6a3ab5;
    }
    .payment-btn.polygon-btn:hover {
      background: #9b5df0;
    }
    .payment-btn:hover {
      background: #444444;
    }

    .save-slot {
      background: #0a0a0a;
      border-radius: 16px;
      padding: 14px;
      margin: 10px 0;
      border: 1px solid #333333;
      cursor: pointer;
      transition: all 0.2s;
    }
    .save-slot:hover {
      border-color: #ffd700;
      background: #111111;
    }
    .save-slot h4 {
      color: #ffd700;
      margin-bottom: 4px;
    }
    .save-slot p {
      color: #888888;
      font-size: 0.8rem;
    }
    .logout-btn {
      background: #8b0000;
      border-bottom-color: #ff0000;
      margin-top: 5px;
    }
    .logout-btn:hover { background: #a00000; }

    h3, p { color: #ffffff; }
    .next-cost {
      font-size: 0.75rem;
      color: #888888;
    }
    .cost-breakdown {
      font-size: 0.7rem;
      color: #ffd700;
      margin-top: 4px;
    }

    #importFileInput {
      display: none;
    }
  </style>
</head>

<div class="game-container" id="app"></div>
<input type="file" id="importFileInput" accept=".txt" />

<script>
  (function() {
    // ============ NUMBER FORMATTING SYSTEM ============
    
    const suffixes = [
      '', 'k', 'm', 'b', 't', 'aa', 'ab', 'ac', 'ad', 'ae', 'af', 'ag', 'ah', 'ai', 'aj', 'ak', 'al', 'am', 'an', 'ao', 'ap', 'aq', 'ar', 'as', 'at', 'au', 'av', 'aw', 'ax', 'ay', 'az',
      'ba', 'bb', 'bc', 'bd', 'be', 'bf', 'bg', 'bh', 'bi', 'bj', 'bk', 'bl', 'bm', 'bn', 'bo', 'bp', 'bq', 'br', 'bs', 'bt', 'bu', 'bv', 'bw', 'bx', 'by', 'bz',
      'ca', 'cb', 'cc', 'cd', 'ce', 'cf', 'cg', 'ch', 'ci', 'cj', 'ck', 'cl', 'cm', 'cn', 'co', 'cp', 'cq', 'cr', 'cs', 'ct', 'cu', 'cv', 'cw', 'cx', 'cy', 'cz'
    ];
    
    function formatNum(num) {
      if (num < 0) return '0';
      if (num < 1000) return Math.floor(num).toString();
      let tier = 0, value = num;
      while (value >= 1000 && tier < suffixes.length - 1) { value /= 1000; tier++; }
      if (tier >= suffixes.length) {
        const extraTiers = tier - suffixes.length + 1;
        const firstLetter = Math.floor(extraTiers / 26), secondLetter = extraTiers % 26;
        return value.toFixed(2).replace(/\.?0+$/, '') + String.fromCharCode(97 + firstLetter) + String.fromCharCode(97 + secondLetter);
      }
      return value.toFixed(2).replace(/\.?0+$/, '') + suffixes[tier];
    }

    const POLYGON_RATE_GBP = 0.07;
    function gbpToPolygon(gbp) { return (gbp / POLYGON_RATE_GBP).toFixed(2); }

    function getBreedStats(breedName) {
      let seed = 0;
      for (let i = 0; i < breedName.length; i++) seed += breedName.charCodeAt(i);
      function seededRandom(s) { const x = Math.sin(s * 9301 + 49297) * 233280; return Math.abs(x - Math.floor(x)); }
      return {
        health: Math.floor(seededRandom(seed) * 5) + 1,
        strength: Math.floor(seededRandom(seed + 1) * 5) + 1,
        attack: Math.floor(seededRandom(seed + 2) * 5) + 1,
        defence: Math.floor(seededRandom(seed + 3) * 5) + 1
      };
    }

    const state = {

        'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-054649%7E2.png'

        'American PitBull': { url: 'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-110631%7E2.png', position: 'center 35%' },
        'American Bulldog': { url: 'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-115556%7E3.png', position: 'center 35%' },
        'Cane Corso': { url: 'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/file_0000000001907246b79913b041113f34%7E2.png', position: 'center 35%' }

      ]
    };

    state.tierPurchases = {};
    state.shopTiers.forEach(tier => { state.tierPurchases[tier.id] = 0; });

    // ============ SAVE SYSTEM ============
    function getAllProfiles() { const p = localStorage.getItem('pawsOfDestiny_profiles'); return p ? JSON.parse(p) : {}; }
    function saveProfiles(profiles) { localStorage.setItem('pawsOfDestiny_profiles', JSON.stringify(profiles)); }
    function saveCurrentProfile() {
      if (!state.currentProfileId) return;
      const profiles = getAllProfiles();
      profiles[state.currentProfileId] = {
        playerName: state.playerName, breed: state.breed, breedStats: state.breedStats,
        bones: state.bones, totalTaps: state.totalTaps, prestigeOwned: state.prestigeOwned,
        tapPowerOwned: state.tapPowerOwned, autoCollectorOwned: state.autoCollectorOwned,
        tapPower: state.tapPower, autoCollector: state.autoCollector,
        prestigeMultiplier: state.prestigeMultiplier, currentTapImage: state.currentTapImage,
        level: state.level, exp: state.exp, expToNextLevel: state.expToNextLevel,
        shopMultiplierOwned: state.shopMultiplierOwned, tierPurchases: state.tierPurchases,
        lastSaved: new Date().toISOString()
      };
      saveProfiles(profiles);
    }
    function loadProfile(profileId) {
      const profiles = getAllProfiles(), profile = profiles[profileId];
      if (profile) { applyProfileData(profile); state.currentProfileId = profileId; return true; }
      return false;
    }
    function applyProfileData(profile) {
      state.playerName = profile.playerName || ''; state.breed = profile.breed || '';
      state.breedStats = profile.breedStats || getBreedStats(profile.breed);
      state.bones = profile.bones || 0; state.totalTaps = profile.totalTaps || 0;
      state.prestigeOwned = profile.prestigeOwned || 0;
      state.tapPowerOwned = profile.tapPowerOwned || 0; state.autoCollectorOwned = profile.autoCollectorOwned || 0;
      state.tapPower = profile.tapPower || 1; state.autoCollector = profile.autoCollector || 0;
      state.prestigeMultiplier = profile.prestigeMultiplier || 1;
      state.currentTapImage = profile.currentTapImage || 0;
      state.level = profile.level || 1; state.exp = profile.exp || 0; state.expToNextLevel = profile.expToNextLevel || 100;
      state.shopMultiplierOwned = profile.shopMultiplierOwned || 0;
      state.tierPurchases = profile.tierPurchases || {};
      state.shopTiers.forEach(tier => { if (!state.tierPurchases[tier.id]) state.tierPurchases[tier.id] = 0; });
    }
    function exportSaveFile() {
      const saveData = {
        playerName: state.playerName, breed: state.breed, breedStats: state.breedStats,
        bones: state.bones, totalTaps: state.totalTaps, prestigeOwned: state.prestigeOwned,
        tapPowerOwned: state.tapPowerOwned, autoCollectorOwned: state.autoCollectorOwned,
        tapPower: state.tapPower, autoCollector: state.autoCollector,
        prestigeMultiplier: state.prestigeMultiplier, currentTapImage: state.currentTapImage,
        level: state.level, exp: state.exp, expToNextLevel: state.expToNextLevel,
        shopMultiplierOwned: state.shopMultiplierOwned, tierPurchases: state.tierPurchases,
        timestamp: new Date().toISOString()
      };
      const blob = new Blob([JSON.stringify(saveData, null, 2)], { type: 'text/plain' });
      const url = URL.createObjectURL(blob), a = document.createElement('a');
      a.href = url; a.download = `paws_of_destiny_${state.playerName}_${new Date().toISOString().slice(0,10)}.txt`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    }
    function importSaveFile() { document.getElementById('importFileInput').click(); }
    function handleFileImport(event) {
      const file = event.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const saveData = JSON.parse(e.target.result);
          if (!saveData.playerName || !saveData.breed) { alert('Invalid save file!'); return; }
          state.currentProfileId = 'profile_' + Date.now(); applyProfileData(saveData);
          saveCurrentProfile(); state.screen = 'main'; renderMainGame();
          alert(`Save imported! Welcome back, ${state.playerName}!`);
        } catch (error) { alert('Failed to parse save file!'); }
      };
      reader.readAsText(file); event.target.value = '';
    }
    function downloadSaveFile() { exportSaveFile(); }
    function logout() { saveCurrentProfile(); state.currentProfileId = null; state.screen = 'login'; renderLoginScreen(); }
    function deleteProfile(profileId) { const profiles = getAllProfiles(); delete profiles[profileId]; saveProfiles(profiles); renderLoginScreen(); }

    // ============ STATS & MULTIPLIERS ============
    function getEffectiveStats() {
      if (!state.breedStats) return { health: 0, strength: 0, attack: 0, defence: 0 };
      return {
        health: state.breedStats.health + state.prestigeOwned,
        strength: state.breedStats.strength + state.prestigeOwned,
        attack: state.breedStats.attack + state.prestigeOwned,
        defence: state.breedStats.defence + state.prestigeOwned
      };
    }
    function getTotalMultiplier() { return (state.prestigeOwned + 1) + state.shopMultiplierOwned; }

    // ============ UPGRADE CALCULATIONS ============
    function getTapPowerCost() { return 25 * (state.tapPowerOwned + 1); }
    function getAutoCollectorCost() { return 40 + (15 * state.autoCollectorOwned); }
    function getPrestigeCost(c) { return 500 * Math.pow(2, c); }
    function getNextPrestigeCost() { return 500 * Math.pow(2, state.prestigeOwned); }
    function calculateMaxTapUpgrades() {
      let a=0,t=0,r=state.bones,c=state.tapPowerOwned;
      while(true){const cost=25*(c+1);if(r>=cost){r-=cost;t+=cost;a++;c++;}else break;}
      return{count:a,totalCost:t};
    }
    function calculateMaxAutoUpgrades() {
      let a=0,t=0,r=state.bones,c=state.autoCollectorOwned;
      while(true){const cost=40+(15*c);if(r>=cost){r-=cost;t+=cost;a++;c++;}else break;}
      return{count:a,totalCost:t};
    }
    function calculateMaxPrestiges() {
      let a=0,t=0,r=state.bones,c=state.prestigeOwned;
      while(true){const cost=getPrestigeCost(c);if(r>=cost){r-=cost;t+=cost;a++;c++;}else break;}
      return{count:a,totalCost:t};
    }
    function performPrestige() {
      state.prestigeOwned++; state.tapPowerOwned=0; state.autoCollectorOwned=0;
      state.tapPower=1; state.autoCollector=0; state.totalTaps=0;
      state.level=1; state.exp=0; state.expToNextLevel=getExpForLevel(1);
    }

    // ============ SHOP ============
    function purchaseTier(tierId, method) {
      const tier = state.shopTiers.find(t => t.id === tierId); if (!tier) return;
      if (!state.tierPurchases[tierId]) state.tierPurchases[tierId] = 0;
      state.shopMultiplierOwned += tier.multiplier; state.tierPurchases[tierId]++;
      saveCurrentProfile();
      alert(`✅ Payment via ${method}!\n\n${tier.name} +x${tier.multiplier}\nBought ${state.tierPurchases[tierId]}x\nTotal multiplier: x${getTotalMultiplier()}`);
      renderShopTab();
    }
    function purchaseTierWithPolygon(tierId) {
      const tier = state.shopTiers.find(t => t.id === tierId); if (!tier) return;
      const pol = gbpToPolygon(tier.price);
      const addr = prompt(`🔷 Polygon Payment\n\n${tier.name}\n+x${tier.multiplier}\n£${tier.price.toFixed(2)} = ${pol} POL\nRate: £${POLYGON_RATE_GBP.toFixed(2)}/POL\n\nPolygon wallet address:\n(Simulated)`);
      if (addr && addr.startsWith('0x')) purchaseTier(tierId, 'Polygon');
      else if (addr) alert('Invalid! Must start with 0x');
    }
    function purchaseTierWithPaypal(tierId) {
      const tier = state.shopTiers.find(t => t.id === tierId); if (!tier) return;
      const email = prompt(`💰 PayPal\n\n${tier.name}\n+x${tier.multiplier}\n£${tier.price.toFixed(2)}\n\nPayPal email:\n(Simulated)`);
      if (email && email.includes('@')) purchaseTier(tierId, 'PayPal');
    }

    // ============ HELPERS ============
    function getTapImages() { return state.breedTapImages[state.breed] || state.defaultTapImages; }
    function getExpForLevel(l) { return Math.floor(100 * Math.pow(1.5, l - 1)); }
    function addExp(amount) {
      state.exp += amount * getTotalMultiplier();
      while (state.exp >= state.expToNextLevel) { state.exp -= state.expToNextLevel; state.level++; state.expToNextLevel = getExpForLevel(state.level); }
      updateExpBar();
    }
    function updateExpBar() {
      const ef=document.getElementById('expFill'),et=document.getElementById('expText'),ld=document.getElementById('levelDisplay');
      if(ef) ef.style.width=(state.exp/state.expToNextLevel*100)+'%';
      if(et) et.textContent=`${formatNum(state.exp)} / ${formatNum(state.expToNextLevel)} EXP`;
      if(ld) ld.textContent=`⭐ Level ${formatNum(state.level)}`;
    }

    // ============ RENDER ============
    function renderLoginScreen() {
      const profiles=getAllProfiles(),ids=Object.keys(profiles);
      let h=`<div class="title-banner"><img src="${state.titleBannerUrl}" alt="Paws of Destiny"/></div><div class="screen active setup-centered" id="loginScreen"><h3 style="color:#ffd700;margin-bottom:15px;">🐾 Paws of Destiny</h3><p style="color:#cccccc;margin-bottom:20px;">Welcome back!</p>`;
      if(ids.length>0){h+=`<div style="width:100%;max-width:400px;">`;ids.forEach(id=>{const p=profiles[id];h+=`<div class="save-slot" data-profile="${id}"><h4>🐕 ${p.playerName}</h4><p>${p.breed} | Lvl ${formatNum(p.level)} | 🦴 ${formatNum(p.bones)}</p><p style="font-size:0.7rem;">${new Date(p.lastSaved).toLocaleDateString()}</p><button class="delete-profile-btn" data-profile="${id}" style="background:#440000;margin-top:6px;font-size:0.7rem;">🗑️ Delete</button></div>`;});h+=`</div>`;}
      else h+=`<p style="color:#888;margin:20px 0;">No profiles found.</p>`;
      h+=`<button class="start-btn" id="newProfileBtn" style="margin-top:20px;">✨ New Profile</button><button class="import-btn" id="importSaveBtn">📥 Import Save</button></div>`;
      appDiv.innerHTML=h;
      document.querySelectorAll('.save-slot').forEach(s=>{s.addEventListener('click',e=>{if(e.target.classList.contains('delete-profile-btn'))return;if(loadProfile(s.dataset.profile)){state.screen='main';renderMainGame();}});});
      document.querySelectorAll('.delete-profile-btn').forEach(b=>{b.addEventListener('click',e=>{e.stopPropagation();if(confirm('Delete?'))deleteProfile(b.dataset.profile);});});
      document.getElementById('newProfileBtn').addEventListener('click',()=>{
        state.screen='setup';state.currentProfileId='profile_'+Date.now();state.playerName='';state.breed='';state.breedStats=null;state.bones=0;state.totalTaps=0;state.prestigeOwned=0;state.tapPowerOwned=0;state.autoCollectorOwned=0;state.tapPower=1;state.autoCollector=0;state.prestigeMultiplier=1;state.currentTapImage=0;state.level=1;state.exp=0;state.expToNextLevel=getExpForLevel(1);state.shopMultiplierOwned=0;state.tierPurchases={};state.shopTiers.forEach(t=>{state.tierPurchases[t.id]=0;});renderSetup();
      });
      document.getElementById('importSaveBtn').addEventListener('click',importSaveFile);
    }

    function renderSetup() {
      let h=`<div class="title-banner"><img src="${state.titleBannerUrl}" alt="Paws of Destiny"/></div><div class="screen active setup-centered" id="setupScreen"><h3 style="color:#ffd700;margin-bottom:10px;">🐾 Choose Your Destiny</h3><input class="input-field" id="nameInput" placeholder="Enter your dog's name" value="${state.playerName}"/><p style="color:#cccccc;font-weight:bold;">Pick your breed:</p><div class="breed-grid" id="breedGrid">`;
      state.breedOptions.forEach(breed=>{
        const bd=state.breedImages[breed],url=bd?.url||'',pos=bd?.position||'center 35%';
        const style=url?`background-image:url('${url}');background-size:cover;background-position:${pos};`:'';
        const content=url?'':'🖼️<br>add image',stats=getBreedStats(breed);
        h+=`<div class="breed-card ${state.breed===breed?'selected':''}" data-breed="${breed}"><div class="breed-img-placeholder" style="${style}">${content}</div><div class="breed-name">${breed}</div><div class="breed-stats"><span>❤️${stats.health}</span><span>💪${stats.strength}</span><span>⚔️${stats.attack}</span><span>🛡️${stats.defence}</span></div></div>`;
      });
      h+=`</div><button class="start-btn" id="startGameBtn">⚔️ Enter Paws of Destiny</button><button class="logout-btn" id="backToLoginBtn" style="margin-top:8px;">↩️ Back to Profiles</button></div>`;
      appDiv.innerHTML=h;
      document.getElementById('nameInput').addEventListener('input',e=>{state.playerName=e.target.value;});
      document.querySelectorAll('.breed-card').forEach(c=>{c.addEventListener('click',()=>{state.breed=c.dataset.breed;state.breedStats=getBreedStats(state.breed);renderSetup();});});
      document.getElementById('startGameBtn').addEventListener('click',()=>{if(!state.playerName.trim()){alert('Enter a name!');return;}if(!state.breed){alert('Select a breed!');return;}state.screen='main';saveCurrentProfile();renderMainGame();});
      document.getElementById('backToLoginBtn').addEventListener('click',()=>{state.screen='login';renderLoginScreen();});
    }

    function renderMainGame() {
      const imgs=getTapImages(),cur=imgs[state.currentTapImage],tm=getTotalMultiplier();
      let h=`<div class="title-banner"><img src="${state.titleBannerUrl}" alt="Paws of Destiny"/></div><div class="game-header"><h2>🐕 ${state.playerName}</h2><div class="resource-badge">🦴 <span id="boneDisplay">${formatNum(state.bones)}</span></div></div><div class="screen active" id="mainScreen"><div class="tap-area" id="tapDog"><img src="${cur}" alt="Tap" class="tap-gif" id="tapGif"/></div><div class="level-container"><div class="level-display" id="levelDisplay">⭐ Level ${formatNum(state.level)}</div><div class="exp-bar-bg"><div class="exp-bar-fill" id="expFill" style="width:${(state.exp/state.expToNextLevel)*100}%;"></div></div><div class="exp-text" id="expText">${formatNum(state.exp)} / ${formatNum(state.expToNextLevel)} EXP (x${tm})</div></div><div class="stat-row"><span>${state.breed}</span><span>⭐ Prestige ${formatNum(state.prestigeOwned)}</span></div><div class="tab-row"><div class="tab active" data-tab="profile">🐶 Profile</div><div class="tab" data-tab="upgrades">📈 Upgrades</div><div class="tab" data-tab="prestige">🌟 Prestige</div><div class="tab" data-tab="shop">🛒 Shop</div></div><div id="tabContent"></div></div>`;
      appDiv.innerHTML=h;
      document.getElementById('tapDog').addEventListener('click',handleTap);
      attachTabEvents();renderProfileTab();startAutoCollector();
    }

    function handleTap(){const tm=getTotalMultiplier();state.bones+=state.tapPower*tm;state.totalTaps++;addExp(state.tapPower);updateBoneDisplay();cycleToNextImage();if(state.tabActive==='upgrades')renderUpgradesTab();else if(state.tabActive==='profile')renderProfileTab();else if(state.tabActive==='prestige')renderPrestigeTab();}
    function cycleToNextImage(){const imgs=getTapImages();state.currentTapImage=(state.currentTapImage+1)%imgs.length;const g=document.getElementById('tapGif');if(g)g.src=imgs[state.currentTapImage];}
    function updateBoneDisplay(){const b=document.getElementById('boneDisplay');if(b)b.textContent=formatNum(state.bones);}
    let autoInterval;
    function startAutoCollector(){if(autoInterval)clearInterval(autoInterval);autoInterval=setInterval(()=>{if(state.autoCollector>0){const tm=getTotalMultiplier();state.bones+=state.autoCollector*tm;addExp(state.autoCollector);updateBoneDisplay();if(state.tabActive==='upgrades')renderUpgradesTab();else if(state.tabActive==='prestige')renderPrestigeTab();}},1000);}
    state.tabActive='profile';
    function attachTabEvents(){document.querySelectorAll('.tab').forEach(t=>{t.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');state.tabActive=t.dataset.tab;switch(state.tabActive){case'profile':renderProfileTab();break;case'upgrades':renderUpgradesTab();break;case'prestige':renderPrestigeTab();break;case'shop':renderShopTab();break;}});});}

    function renderProfileTab(){
      const c=document.getElementById('tabContent');if(!c)return;
      const stats=getEffectiveStats(),tm=getTotalMultiplier();
      c.innerHTML=`<div style="color:#fff;padding:10px;"><h3 style="color:#ffd700;">🐾 ${state.playerName}</h3><p><strong>Breed:</strong> ${state.breed}</p><div class="stats-grid"><div class="stat-box"><div class="stat-label">❤️ Health</div><div class="stat-value">${stats.health}</div></div><div class="stat-box"><div class="stat-label">💪 Strength</div><div class="stat-value">${stats.strength}</div></div><div class="stat-box"><div class="stat-label">⚔️ Attack</div><div class="stat-value">${stats.attack}</div></div><div class="stat-box"><div class="stat-label">🛡️ Defence</div><div class="stat-value">${stats.defence}</div></div></div><p><strong>Level:</strong> ${formatNum(state.level)} | <strong>Prestige:</strong> ${formatNum(state.prestigeOwned)}</p><p>⭐ EXP: ${formatNum(state.exp)}/${formatNum(state.expToNextLevel)}</p><p>🦴 Bones: ${formatNum(state.bones)}</p><p>⚡ Tap: ${formatNum(state.tapPower)} | 🕒 Auto: ${formatNum(state.autoCollector)}/s</p><p>🌟 Total Multiplier: x${tm} (Prestige: +${state.prestigeOwned}x | Shop: +${formatNum(state.shopMultiplierOwned)}x)</p><button id="downloadSaveBtn" style="margin-top:10px;width:100%;">💾 Download Save</button><button id="logoutBtn" class="logout-btn" style="margin-top:8px;width:100%;">🚪 Logout</button></div>`;
      document.getElementById('downloadSaveBtn').addEventListener('click',downloadSaveFile);
      document.getElementById('logoutBtn').addEventListener('click',logout);
    }

    function renderUpgradesTab(){
      const c=document.getElementById('tabContent');if(!c)return;
      const tc=getTapPowerCost(),ac=getAutoCollectorCost(),mt=calculateMaxTapUpgrades(),ma=calculateMaxAutoUpgrades();
      c.innerHTML=`<div class="upgrade-item"><div class="upgrade-info"><span>💪 Tap Power +1</span><span>Cost: ${formatNum(tc)} 🦴</span></div><p class="next-cost">Owned: ${formatNum(state.tapPowerOwned)} | Max: ${mt.count} (${formatNum(mt.totalCost)} 🦴)</p><div class="upgrade-buttons"><button id="upgradeTapBtn">Buy 1</button><button id="maxTapBtn" class="max-buy-btn">Max (${mt.count})</button></div></div><div class="upgrade-item"><div class="upgrade-info"><span>🕒 Auto Collector +1/s</span><span>Cost: ${formatNum(ac)} 🦴</span></div><p class="next-cost">Owned: ${formatNum(state.autoCollectorOwned)} | Max: ${ma.count} (${formatNum(ma.totalCost)} 🦴)</p><div class="upgrade-buttons"><button id="upgradeAutoBtn">Buy 1</button><button id="maxAutoBtn" class="max-buy-btn">Max (${ma.count})</button></div></div><p style="color:#ccc;margin-top:10px;">Tap: ${formatNum(state.tapPower)} | Auto: ${formatNum(state.autoCollector)}/s | 🦴 ${formatNum(state.bones)}</p>`;
      document.getElementById('upgradeTapBtn').addEventListener('click',()=>{const p=getTapPowerCost();if(state.bones>=p){state.bones-=p;state.tapPowerOwned++;state.tapPower++;updateBoneDisplay();renderUpgradesTab();}else alert('Not enough!');});
      document.getElementById('maxTapBtn').addEventListener('click',()=>{const m=calculateMaxTapUpgrades();if(m.count>0){state.bones-=m.totalCost;state.tapPowerOwned+=m.count;state.tapPower+=m.count;updateBoneDisplay();renderUpgradesTab();}else alert('Not enough!');});
      document.getElementById('upgradeAutoBtn').addEventListener('click',()=>{const p=getAutoCollectorCost();if(state.bones>=p){state.bones-=p;state.autoCollectorOwned++;state.autoCollector++;updateBoneDisplay();renderUpgradesTab();}else alert('Not enough!');});
      document.getElementById('maxAutoBtn').addEventListener('click',()=>{const m=calculateMaxAutoUpgrades();if(m.count>0){state.bones-=m.totalCost;state.autoCollectorOwned+=m.count;state.autoCollector+=m.count;updateBoneDisplay();renderUpgradesTab();}else alert('Not enough!');});
    }

    function renderPrestigeTab(){
      const c=document.getElementById('tabContent');if(!c)return;
      const nc=getNextPrestigeCost(),mp=calculateMaxPrestiges(),cam=mp.count>0?getPrestigeCost(state.prestigeOwned+mp.count):nc,tm=getTotalMultiplier(),mam=tm+mp.count;
      c.innerHTML=`<div class="prestige-item"><div class="prestige-info"><span>🌟 Prestige</span><span>Next: ${formatNum(nc)} 🦴</span></div><p class="next-cost">Owned: ${formatNum(state.prestigeOwned)} | Max: ${mp.count} (${formatNum(mp.totalCost)} 🦴)</p><p class="next-cost">Multiplier: x${tm}</p>${mp.count>0?`<p class="cost-breakdown">After max: ${formatNum(state.prestigeOwned+mp.count)} owned | x${mam} | Next: ${formatNum(cam)} 🦴</p>`:''}<div class="prestige-buttons"><button id="maxPrestigeBtn" class="max-buy-btn" ${mp.count===0?'disabled':''}>Max (${mp.count})</button></div>${mp.count===0?`<p style="color:#f44;font-size:0.8rem;margin-top:5px;">Need ${formatNum(nc-state.bones)} more 🦴</p>`:''}</div><p style="color:#ccc;margin-top:10px;">Resets level & upgrades. Keeps multipliers & stats.</p><p style="color:#ffd700;font-size:0.8rem;">+1x multiplier, +1 stats per prestige!</p>`;
      document.getElementById('maxPrestigeBtn').addEventListener('click',()=>{const m=calculateMaxPrestiges();if(m.count>0){state.bones-=m.totalCost;for(let i=0;i<m.count;i++)performPrestige();updateBoneDisplay();updateExpBar();saveCurrentProfile();renderPrestigeTab();alert(`Done! ${m.count} prestiges. x${getTotalMultiplier()}`);}});
    }

    function renderShopTab(){
      const c=document.getElementById('tabContent');if(!c)return;
      let h=`<div style="color:#fff;"><h3 style="color:#ffd700;margin-bottom:5px;">🛒 Shop</h3><div class="polygon-rate">🔷 POL Rate: £${POLYGON_RATE_GBP.toFixed(2)}/POL • Unlimited buys!</div><p style="color:#ccc;font-size:0.8rem;margin-bottom:10px;">Multipliers stack additively.</p>`;
      state.shopTiers.forEach((tier,i)=>{
        const pc=state.tierPurchases[tier.id]||0,total=pc*tier.multiplier,bv=i===4,feat=i===2;
        let cls='shop-tier';if(bv)cls+=' best-value';else if(feat)cls+=' featured';
        h+=`<div class="${cls}">${bv?'<div class="best-value-badge">BEST VALUE</div>':(feat?'<div class="tier-badge">POPULAR</div>':'')}<div class="tier-header">T${tier.id}: ${tier.name}</div><div class="tier-multiplier">+x${tier.multiplier}</div><div class="tier-price">£${tier.price.toFixed(2)}</div><div class="tier-polygon-price">🔷 ${gbpToPolygon(tier.price)} POL</div>${pc>0?`<div class="tier-owned-count">📦 ${pc}x | Total: +${total}x</div>`:''}<div class="tier-value">${tier.value}</div><button class="buy-tier-btn" id="buyTier${tier.id}">Buy Now</button><div class="payment-options"><button class="payment-btn polygon-btn" id="polygonBtn${tier.id}">🔷 POL</button><button class="payment-btn" id="paypalBtn${tier.id}">💰 PayPal</button></div></div>`;
      });
      h+=`<p style="color:#888;font-size:0.7rem;margin-top:10px;text-align:center;">🔒 Polygon • Low fees • Stackable</p></div>`;
      c.innerHTML=h;
      state.shopTiers.forEach(tier=>{
        document.getElementById('polygonBtn'+tier.id)?.addEventListener('click',()=>purchaseTierWithPolygon(tier.id));
        document.getElementById('paypalBtn'+tier.id)?.addEventListener('click',()=>purchaseTierWithPaypal(tier.id));
        document.getElementById('buyTier'+tier.id)?.addEventListener('click',()=>purchaseTierWithPolygon(tier.id));
      });
    }

    const appDiv=document.getElementById('app');
    document.getElementById('importFileInput').addEventListener('change',handleFileImport);
    renderLoginScreen();
  })();
</script>
</body>
</html>
