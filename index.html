<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Paws of Destiny · Idle Dog RPG</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Arial', sans-serif;
    }

    body {
      background: #000000;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
    }

    .game-container {
      max-width: 500px;
      width: 100%;
      background: #000000;
      border-radius: 0;
      box-shadow: none;
      overflow: hidden;
      border: none;
    }

    .title-banner {
      width: 100%;
      padding: 8px 0;
      background: #000000;
      border-bottom: 1px solid #222222;
    }
    .title-banner img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
    }

    .game-header {
      background: #000000;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #222222;
    }
    .game-header h2 {
      color: #ffffff;
      font-weight: 800;
      letter-spacing: 2px;
      font-size: 1rem;
      text-shadow: 0 2px 4px black;
    }
    .resource-badge {
      background: #111111;
      padding: 6px 16px;
      border-radius: 30px;
      color: #ffd700;
      font-weight: bold;
      border: 1px solid #333333;
      font-size: 0.9rem;
    }

    .screen {
      display: none;
      padding: 16px;
      background: #000000;
      min-height: 500px;
    }
    .screen.active {
      display: block;
    }

    .setup-centered {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .breed-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 15px;
      width: 100%;
      max-width: 400px;
    }
    .breed-card {
      background: #0a0a0a;
      border-radius: 24px;
      padding: 12px;
      text-align: center;
      border: 2px solid #222222;
      cursor: pointer;
      transition: all 0.2s;
      color: #cccccc;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .breed-card.selected {
      border: 3px solid #ffd700;
      background: #111111;
      box-shadow: 0 0 18px #ffd700;
    }
    
    .breed-img-placeholder {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #0a0a0a;
      border-radius: 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888888;
      font-size: 0.75rem;
      background-size: cover;
      background-position: center 35%;
      border: 1px dashed #333333;
      overflow: hidden;
    }
    
    .breed-name {
      font-weight: bold;
      font-size: 0.8rem;
      text-transform: uppercase;
      margin-top: 4px;
      color: #ffffff;
    }

    .breed-stats {
      font-size: 0.65rem;
      color: #ffd700;
      margin-top: 4px;
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .input-field {
      width: 100%;
      max-width: 400px;
      padding: 14px;
      border-radius: 30px;
      border: 2px solid #333333;
      background: #0a0a0a;
      color: #ffffff;
      font-weight: bold;
      margin: 12px 0;
      outline: none;
      font-size: 1rem;
    }
    .input-field::placeholder {
      color: #888888;
    }
    .start-btn {
      background: #ffd700;
      border: none;
      padding: 16px;
      width: 100%;
      max-width: 400px;
      border-radius: 40px;
      font-weight: bold;
      font-size: 1.2rem;
      color: #000000;
      margin-top: 10px;
      cursor: pointer;
      border-bottom: 4px solid #cc9900;
    }

    .import-btn {
      background: #444444;
      border: none;
      padding: 12px;
      width: 100%;
      max-width: 400px;
      border-radius: 40px;
      font-weight: bold;
      font-size: 1rem;
      color: #ffffff;
      margin-top: 8px;
      cursor: pointer;
      border-bottom: 3px solid #666666;
    }
    .import-btn:hover {
      background: #555555;
    }

    .tap-area {
      background: transparent;
      width: 200px;
      height: 200px;
      margin: 20px auto 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      overflow: hidden;
      position: relative;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      outline: none;
    }
    .tap-area:active,
    .tap-area:focus,
    .tap-area:focus-visible {
      outline: none;
      background: transparent;
      -webkit-tap-highlight-color: transparent;
    }
    .tap-gif {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 0;
      pointer-events: none;
    }

    .level-container {
      margin: 0 auto 16px;
      max-width: 300px;
      text-align: center;
    }
    .level-display {
      color: #ffd700;
      font-weight: bold;
      font-size: 0.9rem;
      margin-bottom: 4px;
    }
    .exp-bar-bg {
      background: #111111;
      height: 12px;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #333333;
      margin-bottom: 2px;
    }
    .exp-bar-fill {
      height: 100%;
      border-radius: 6px;
      background: linear-gradient(90deg, #ffd700, #ffaa00);
      transition: width 0.3s ease;
    }
    .exp-text {
      color: #888888;
      font-size: 0.7rem;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      color: #ffffff;
      font-weight: bold;
      margin: 8px 0;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin: 8px 0;
    }
    .stat-box {
      background: #0a0a0a;
      border-radius: 10px;
      padding: 8px;
      text-align: center;
      border: 1px solid #222222;
    }
    .stat-box .stat-label {
      font-size: 0.7rem;
      color: #888888;
    }
    .stat-box .stat-value {
      font-size: 1rem;
      font-weight: bold;
      color: #ffd700;
    }

    .tab-row {
      display: flex;
      gap: 6px;
      margin-top: 14px;
    }
    .tab {
      flex: 1;
      background: #0a0a0a;
      padding: 10px 4px;
      text-align: center;
      border-radius: 20px 20px 0 0;
      font-weight: bold;
      color: #888888;
      cursor: pointer;
      border: 1px solid #222222;
      border-bottom: none;
      font-size: 0.7rem;
    }
    .tab.active {
      background: #000000;
      color: #ffd700;
      border-bottom: 2px solid #ffd700;
    }

    .upgrade-item, .prestige-item {
      background: #0a0a0a;
      border-radius: 20px;
      padding: 12px;
      margin: 10px 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border: 1px solid #222222;
      color: #ffffff;
    }
    .upgrade-info, .prestige-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .upgrade-buttons, .prestige-buttons {
      display: flex;
      gap: 8px;
    }
    .upgrade-buttons button, .prestige-buttons button {
      flex: 1;
      font-size: 0.75rem;
      padding: 8px 10px;
    }
    .max-buy-btn {
      background: #ffd700;
      color: #000000;
      border-bottom-color: #cc9900;
    }
    .max-buy-btn:hover {
      background: #ffed4a;
    }
    button {
      background: #222222;
      border: none;
      color: #ffffff;
      font-weight: bold;
      padding: 10px 16px;
      border-radius: 30px;
      cursor: pointer;
      border-bottom: 3px solid #444444;
    }
    button:hover { background: #333333; }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Shop tier cards */
    .shop-tier {
      background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
      border-radius: 20px;
      padding: 16px;
      margin: 10px 0;
      border: 1px solid #333333;
      color: #ffffff;
      position: relative;
      overflow: hidden;
    }
    .shop-tier.featured {
      border: 2px solid #ffd700;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }
    .shop-tier.best-value {
      border: 2px solid #ffd700;
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
      background: linear-gradient(145deg, #222200, #0a0a00);
    }
    .tier-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #ffd700;
      color: #000000;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: bold;
    }
    .best-value-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #ffd700;
      color: #000000;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: bold;
      animation: glow 2s ease-in-out infinite;
    }
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 5px #ffd700; }
      50% { box-shadow: 0 0 20px #ffd700; }
    }
    .tier-header {
      font-size: 1.1rem;
      font-weight: bold;
      color: #ffd700;
      margin-bottom: 4px;
    }
    .tier-multiplier {
      font-size: 1.4rem;
      font-weight: bold;
      color: #ffffff;
    }
    .tier-price {
      font-size: 1.1rem;
      color: #ffd700;
      margin: 4px 0;
    }
    .tier-polygon-price {
      font-size: 0.9rem;
      color: #8247e5;
      margin-bottom: 4px;
      font-weight: bold;
    }
    .tier-owned-count {
      font-size: 0.8rem;
      color: #ffd700;
      margin-bottom: 4px;
    }
    .tier-value {
      font-size: 0.75rem;
      color: #888888;
      margin-bottom: 8px;
    }
    .polygon-rate {
      font-size: 0.7rem;
      color: #8247e5;
      margin-bottom: 6px;
    }
    .buy-tier-btn {
      width: 100%;
      background: #ffd700;
      color: #000000;
      font-weight: bold;
      padding: 12px;
      border-radius: 25px;
      border: none;
      cursor: pointer;
      border-bottom: 3px solid #cc9900;
      font-size: 0.9rem;
    }
    .buy-tier-btn:hover {
      background: #ffed4a;
    }
    .payment-options {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }
    .payment-btn {
      flex: 1;
      font-size: 0.7rem;
      padding: 8px 6px;
      background: #333333;
      border-radius: 15px;
      border: none;
      color: #ffffff;
      cursor: pointer;
      border-bottom: 2px solid #555555;
    }
    .payment-btn.polygon-btn {
      background: #8247e5;
      border-bottom-color: #6a3ab5;
    }
    .payment-btn.polygon-btn:hover {
      background: #9b5df0;
    }
    .payment-btn:hover {
      background: #444444;
    }

    .save-slot {
      background: #0a0a0a;
      border-radius: 16px;
      padding: 14px;
      margin: 10px 0;
      border: 1px solid #333333;
      cursor: pointer;
      transition: all 0.2s;
    }
    .save-slot:hover {
      border-color: #ffd700;
      background: #111111;
    }
    .save-slot h4 {
      color: #ffd700;
      margin-bottom: 4px;
    }
    .save-slot p {
      color: #888888;
      font-size: 0.8rem;
    }
    .logout-btn {
      background: #8b0000;
      border-bottom-color: #ff0000;
      margin-top: 5px;
    }
    .logout-btn:hover { background: #a00000; }

    h3, p { color: #ffffff; }
    .next-cost {
      font-size: 0.75rem;
      color: #888888;
    }
    .cost-breakdown {
      font-size: 0.7rem;
      color: #ffd700;
      margin-top: 4px;
    }

    #importFileInput {
      display: none;
    }
  </style>
</head>
<body>
<div class="game-container" id="app"></div>
<input type="file" id="importFileInput" accept=".txt" />

<script>
  (function() {
    // ============ NUMBER FORMATTING SYSTEM ============
    
    const suffixes = [
      '', 'k', 'm', 'b', 't', 'aa', 'ab', 'ac', 'ad', 'ae', 'af', 'ag', 'ah', 'ai', 'aj', 'ak', 'al', 'am', 'an', 'ao', 'ap', 'aq', 'ar', 'as', 'at', 'au', 'av', 'aw', 'ax', 'ay', 'az',
      'ba', 'bb', 'bc', 'bd', 'be', 'bf', 'bg', 'bh', 'bi', 'bj', 'bk', 'bl', 'bm', 'bn', 'bo', 'bp', 'bq', 'br', 'bs', 'bt', 'bu', 'bv', 'bw', 'bx', 'by', 'bz',
      'ca', 'cb', 'cc', 'cd', 'ce', 'cf', 'cg', 'ch', 'ci', 'cj', 'ck', 'cl', 'cm', 'cn', 'co', 'cp', 'cq', 'cr', 'cs', 'ct', 'cu', 'cv', 'cw', 'cx', 'cy', 'cz'
    ];
    
    function formatNum(num) {
      if (num < 0) return '0';
      if (num < 1000) return Math.floor(num).toString();
      
      let tier = 0;
      let value = num;
      
      while (value >= 1000 && tier < suffixes.length - 1) {
        value /= 1000;
        tier++;
      }
      
      if (tier >= suffixes.length) {
        const extraTiers = tier - suffixes.length + 1;
        const firstLetter = Math.floor(extraTiers / 26);
        const secondLetter = extraTiers % 26;
        const dynamicSuffix = String.fromCharCode(97 + firstLetter) + String.fromCharCode(97 + secondLetter);
        return value.toFixed(2).replace(/\.?0+$/, '') + dynamicSuffix;
      }
      
      return value.toFixed(2).replace(/\.?0+$/, '') + suffixes[tier];
    }

    // ============ POLYGON RATE ============
    const POLYGON_RATE_GBP = 0.07; // £0.07 per POL
    
    function gbpToPolygon(gbp) {
      return (gbp / POLYGON_RATE_GBP).toFixed(2);
    }

    // ============ BREED STATS GENERATOR ============
    
    function getBreedStats(breedName) {
      let seed = 0;
      for (let i = 0; i < breedName.length; i++) {
        seed += breedName.charCodeAt(i);
      }
      
      function seededRandom(s) {
        const x = Math.sin(s * 9301 + 49297) * 233280;
        return Math.abs(x - Math.floor(x));
      }
      
      return {
        health: Math.floor(seededRandom(seed) * 5) + 1,
        strength: Math.floor(seededRandom(seed + 1) * 5) + 1,
        attack: Math.floor(seededRandom(seed + 2) * 5) + 1,
        defence: Math.floor(seededRandom(seed + 3) * 5) + 1
      };
    }

    const state = {
      screen: 'login',
      currentProfileId: null,
      playerName: '',
      breed: '',
      breedStats: null,
      bones: 0,
      totalTaps: 0,
      prestigeOwned: 0,
      tapPowerOwned: 0,
      autoCollectorOwned: 0,
      tapPower: 1,
      autoCollector: 0,
      prestigeMultiplier: 1,
      currentTapImage: 0,
      level: 1,
      exp: 0,
      expToNextLevel: 100,
      shopMultiplierOwned: 0,
      tierPurchases: {},
      titleBannerUrl: 'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/file_000000006e3c7243adb2fa6d9b40ef21.png',
      defaultTapImages: [
        'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-054556%7E2.png',
        'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-054625%7E2.png',
        'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-054630%7E2.png',
        'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-054635%7E2.png',
        'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-054642%7E2.png',
        'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-054649%7E2.png'
      ],
      breedTapImages: {
        'Staffordshire Bull Terrier': [
          'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-062822%7E3.png',
          'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-062836%7E2.png',
          'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-062846%7E2.png',
          'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-062914%7E2.png',
          'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-062934%7E2.png',
          'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-063013%7E2.png'
        ],
        'American PitBull': [
          'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-111127%7E2.png',
          'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-111205%7E2.png',

          'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-120214%7E2.png',

          'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-120237%7E2.png',
          'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-120350%7E2.png'
        ]
      },
      breedImages: {
        'Staffordshire Bull Terrier': { url: 'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-062136%7E2.png', position: 'center 35%' },
        'XL Bully': { url: 'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-044808%7E3.png', position: 'center 35%' },
        'American PitBull': { url: 'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-110631%7E2.png', position: 'center 35%' },
        'American Bulldog': { url: 'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-115556%7E3.png', position: 'center 35%' }
      },
      breedOptions: [
        'Staffordshire Bull Terrier', 'American PitBull', 'American Bulldog',
        'XL Bully', 'Cane Corso', 'Japanese Akita', 'Doberman',
        'Husky', 'Chihuahua', 'Jack Russell', 'Shih Tzu', 'German Shepherd'
      ],
      shopTiers: [
        { id: 1, name: 'Starter Pack', multiplier: 10, price: 0.99, value: '£0.099 per x1' },
        { id: 2, name: 'Booster Pack', multiplier: 25, price: 1.99, value: '£0.080 per x1' },
        { id: 3, name: 'Pro Pack', multiplier: 60, price: 3.99, value: '£0.067 per x1' },
        { id: 4, name: 'Elite Pack', multiplier: 150, price: 7.99, value: '£0.053 per x1' },
        { id: 5, name: 'Ultimate Pack', multiplier: 500, price: 14.99, value: '£0.030 per x1' }
      ]
    };

    // Initialize tier purchases
    state.tierPurchases = {};
    state.shopTiers.forEach(tier => {
      state.tierPurchases[tier.id] = 0;
    });

    // ============ SAVE SYSTEM ============
    
    function getAllProfiles() {
      const profiles = localStorage.getItem('pawsOfDestiny_profiles');
      return profiles ? JSON.parse(profiles) : {};
    }
    
    function saveProfiles(profiles) {
      localStorage.setItem('pawsOfDestiny_profiles', JSON.stringify(profiles));
    }
    
    function saveCurrentProfile() {
      if (!state.currentProfileId) return;
      const profiles = getAllProfiles();
      profiles[state.currentProfileId] = {
        playerName: state.playerName, breed: state.breed, breedStats: state.breedStats,
        bones: state.bones, totalTaps: state.totalTaps, prestigeOwned: state.prestigeOwned,
        tapPowerOwned: state.tapPowerOwned, autoCollectorOwned: state.autoCollectorOwned,
        tapPower: state.tapPower, autoCollector: state.autoCollector,
        prestigeMultiplier: state.prestigeMultiplier, currentTapImage: state.currentTapImage,
        level: state.level, exp: state.exp, expToNextLevel: state.expToNextLevel,
        shopMultiplierOwned: state.shopMultiplierOwned,
        tierPurchases: state.tierPurchases,
        lastSaved: new Date().toISOString()
      };
      saveProfiles(profiles);
    }
    
    function loadProfile(profileId) {
      const profiles = getAllProfiles();
      const profile = profiles[profileId];
      if (profile) {
        applyProfileData(profile);
        state.currentProfileId = profileId;
        return true;
      }
      return false;
    }
    
    function applyProfileData(profile) {
      state.playerName = profile.playerName || '';
      state.breed = profile.breed || '';
      state.breedStats = profile.breedStats || getBreedStats(profile.breed);
      state.bones = profile.bones || 0;
      state.totalTaps = profile.totalTaps || 0;
      state.prestigeOwned = profile.prestigeOwned || 0;
      state.tapPowerOwned = profile.tapPowerOwned || 0;
      state.autoCollectorOwned = profile.autoCollectorOwned || 0;
      state.tapPower = profile.tapPower || 1;
      state.autoCollector = profile.autoCollector || 0;
      state.prestigeMultiplier = profile.prestigeMultiplier || 1;
      state.currentTapImage = profile.currentTapImage || 0;
      state.level = profile.level || 1;
      state.exp = profile.exp || 0;
      state.expToNextLevel = profile.expToNextLevel || 100;
      state.shopMultiplierOwned = profile.shopMultiplierOwned || 0;
      state.tierPurchases = profile.tierPurchases || {};
      // Initialize any missing tier purchases
      state.shopTiers.forEach(tier => {
        if (!state.tierPurchases[tier.id]) state.tierPurchases[tier.id] = 0;
      });
    }
    
    // ============ IMPORT/EXPORT SYSTEM ============
    
    function exportSaveFile() {
      const saveData = {
        playerName: state.playerName, breed: state.breed, breedStats: state.breedStats,
        bones: state.bones, totalTaps: state.totalTaps, prestigeOwned: state.prestigeOwned,
        tapPowerOwned: state.tapPowerOwned, autoCollectorOwned: state.autoCollectorOwned,
        tapPower: state.tapPower, autoCollector: state.autoCollector,
        prestigeMultiplier: state.prestigeMultiplier, currentTapImage: state.currentTapImage,
        level: state.level, exp: state.exp, expToNextLevel: state.expToNextLevel,
        shopMultiplierOwned: state.shopMultiplierOwned,
        tierPurchases: state.tierPurchases,
        timestamp: new Date().toISOString()
      };
      
      const saveText = JSON.stringify(saveData, null, 2);
      const blob = new Blob([saveText], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `paws_of_destiny_${state.playerName}_${new Date().toISOString().slice(0,10)}.txt`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
    
    function importSaveFile() {
      const fileInput = document.getElementById('importFileInput');
      fileInput.click();
    }
    
    function handleFileImport(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const saveData = JSON.parse(e.target.result);
          if (!saveData.playerName || !saveData.breed) { alert('Invalid save file!'); return; }
          const profileId = 'profile_' + Date.now();
          state.currentProfileId = profileId;
          applyProfileData(saveData);
          saveCurrentProfile();
          state.screen = 'main';
          renderMainGame();
          alert(`Save imported successfully! Welcome back, ${state.playerName}!`);
        } catch (error) { alert('Failed to parse save file!'); }
      };
      reader.readAsText(file);
      event.target.value = '';
    }
    
    function downloadSaveFile() { exportSaveFile(); }
    
    function logout() {
      saveCurrentProfile();
      state.currentProfileId = null;
      state.screen = 'login';
      renderLoginScreen();
    }
    
    function deleteProfile(profileId) {
      const profiles = getAllProfiles();
      delete profiles[profileId];
      saveProfiles(profiles);
      renderLoginScreen();
    }

    // ============ STAT CALCULATIONS ============
    
    function getEffectiveStats() {
      if (!state.breedStats) return { health: 0, strength: 0, attack: 0, defence: 0 };
      return {
        health: state.breedStats.health + state.prestigeOwned,
        strength: state.breedStats.strength + state.prestigeOwned,
        attack: state.breedStats.attack + state.prestigeOwned,
        defence: state.breedStats.defence + state.prestigeOwned
      };
    }

    // ============ MULTIPLIER SYSTEM ============
    
    function getTotalMultiplier() {
      return (state.prestigeOwned + 1) + state.shopMultiplierOwned;
    }

    // ============ UPGRADE CALCULATIONS ============
    
    function getTapPowerCost() { return 25 * (state.tapPowerOwned + 1); }
    function getAutoCollectorCost() { return 40 + (15 * state.autoCollectorOwned); }
    function getPrestigeCost(ownedCount) { return 500 * Math.pow(2, ownedCount); }
    function getNextPrestigeCost() { return 500 * Math.pow(2, state.prestigeOwned); }
    
    function calculateMaxTapUpgrades() {
      let affordable = 0, totalCost = 0, remainingBones = state.bones, currentOwned = state.tapPowerOwned;
      while (true) {
        const cost = 25 * (currentOwned + 1);
        if (remainingBones >= cost) { remainingBones -= cost; totalCost += cost; affordable++; currentOwned++; }
        else break;
      }
      return { count: affordable, totalCost: totalCost };
    }
    
    function calculateMaxAutoUpgrades() {
      let affordable = 0, totalCost = 0, remainingBones = state.bones, currentOwned = state.autoCollectorOwned;
      while (true) {
        const cost = 40 + (15 * currentOwned);
        if (remainingBones >= cost) { remainingBones -= cost; totalCost += cost; affordable++; currentOwned++; }
        else break;
      }
      return { count: affordable, totalCost: totalCost };
    }
    
    function calculateMaxPrestiges() {
      let affordable = 0, totalCost = 0, remainingBones = state.bones, currentOwned = state.prestigeOwned;
      while (true) {
        const cost = getPrestigeCost(currentOwned);
        if (remainingBones >= cost) { remainingBones -= cost; totalCost += cost; affordable++; currentOwned++; }
        else break;
      }
      return { count: affordable, totalCost: totalCost };
    }
    
    function performPrestige() {
      state.prestigeOwned++;
      state.tapPowerOwned = 0; state.autoCollectorOwned = 0;
      state.tapPower = 1; state.autoCollector = 0; state.totalTaps = 0;
      state.level = 1; state.exp = 0; state.expToNextLevel = getExpForLevel(1);
    }
    
    // ============ SHOP PURCHASE SYSTEM ============
    
    function purchaseTier(tierId, method) {
      const tier = state.shopTiers.find(t => t.id === tierId);
      if (!tier) return;
      
      // Initialize purchase count if needed
      if (!state.tierPurchases[tierId]) state.tierPurchases[tierId] = 0;
      
      // Add the tier's multiplier to the player's total
      state.shopMultiplierOwned += tier.multiplier;
      state.tierPurchases[tierId]++;
      
      saveCurrentProfile();
      
      const totalMult = getTotalMultiplier();
      alert(`✅ Payment Successful via ${method}!\n\n${tier.name} purchased!\n+x${tier.multiplier} multiplier added!\n\nYou've bought this pack ${state.tierPurchases[tierId]} time(s)\nTotal from this tier: +${tier.multiplier * state.tierPurchases[tierId]}x\n\nTotal multiplier: x${totalMult}`);
      
      renderShopTab();
    }
    
    function purchaseTierWithPolygon(tierId) {
      const tier = state.shopTiers.find(t => t.id === tierId);
      if (!tier) return;
      
      const polAmount = gbpToPolygon(tier.price);
      const walletAddress = prompt(
        `🔷 Polygon Network Payment\n\n` +
        `Tier: ${tier.name}\n` +
        `Multiplier: x${tier.multiplier}\n` +
        `Price: £${tier.price.toFixed(2)}\n` +
        `POL Amount: ${polAmount} POL\n` +
        `Rate: £${POLYGON_RATE_GBP.toFixed(2)}/POL\n\n` +
        `Enter your Polygon wallet address:\n` +
        `(Simulated payment)`
      );
      
      if (walletAddress && walletAddress.startsWith('0x')) {
        purchaseTier(tierId, 'Polygon');
      } else if (walletAddress) {
        alert('Invalid wallet address! Polygon addresses start with 0x');
      }
    }
    
    function purchaseTierWithPaypal(tierId) {
      const tier = state.shopTiers.find(t => t.id === tierId);
      if (!tier) return;
      
      const paypalEmail = prompt(
        `💰 PayPal Payment\n\n` +
        `Tier: ${tier.name}\n` +
        `Multiplier: x${tier.multiplier}\n` +
        `Price: £${tier.price.toFixed(2)}\n\n` +
        `Enter your PayPal email:\n` +
        `(Simulated payment)`
      );
      
      if (paypalEmail && paypalEmail.includes('@')) {
        purchaseTier(tierId, 'PayPal');
      }
    }
    
    // ============ HELPER FUNCTIONS ============
    
    function getTapImages() { return state.breedTapImages[state.breed] || state.defaultTapImages; }
    function getExpForLevel(level) { return Math.floor(100 * Math.pow(1.5, level - 1)); }
    
    function addExp(amount) {
      const multipliedAmount = amount * getTotalMultiplier();
      state.exp += multipliedAmount;
      while (state.exp >= state.expToNextLevel) {
        state.exp -= state.expToNextLevel; state.level++;
        state.expToNextLevel = getExpForLevel(state.level);
      }
      updateExpBar();
    }
    
    function updateExpBar() {
      const expFill = document.getElementById('expFill'), expText = document.getElementById('expText'), levelDisplay = document.getElementById('levelDisplay');
      if (expFill) expFill.style.width = (state.exp / state.expToNextLevel * 100) + '%';
      if (expText) expText.textContent = `${formatNum(state.exp)} / ${formatNum(state.expToNextLevel)} EXP`;
      if (levelDisplay) levelDisplay.textContent = `⭐ Level ${formatNum(state.level)}`;
    }

    // ============ RENDER SCREENS ============

        <div class="title-banner"><img src="${state.titleBannerUrl}" alt="Paws of Destiny" /></div>

      }

      document.querySelectorAll('.save-slot').forEach(slot => {

      document.querySelectorAll('.delete-profile-btn').forEach(btn => {

      document.getElementById('newProfileBtn').addEventListener('click', () => {

        state.tapPower = 1; state.autoCollector = 0; state.prestigeMultiplier = 1; state.currentTapImage = 0;
        state.level = 1; state.exp = 0; state.expToNextLevel = getExpForLevel(1); state.shopMultiplierOwned = 0;

      document.getElementById('importSaveBtn').addEventListener('click', importSaveFile);
    }
    
    function renderSetup() {
      let html = `<div class="title-banner"><img src="${state.titleBannerUrl}" alt="Paws of Destiny" /></div>

      });
      document.getElementById('backToLoginBtn').addEventListener('click', () => { state.screen = 'login'; renderLoginScreen(); });

    function renderMainGame() {
      const tapImages = getTapImages(), currentImage = tapImages[state.currentTapImage], totalMult = getTotalMultiplier();
      let html = `<div class="title-banner"><img src="${state.titleBannerUrl}" alt="Paws of Destiny" /></div>

    function handleTap() {
      const totalMult = getTotalMultiplier();
      state.bones += state.tapPower * totalMult; state.totalTaps++; addExp(state.tapPower);
      updateBoneDisplay(); cycleToNextImage();
      if (state.tabActive === 'upgrades') renderUpgradesTab();
      else if (state.tabActive === 'profile') renderProfileTab();
      else if (state.tabActive === 'prestige') renderPrestigeTab();
    }
    
    function cycleToNextImage() {
      const tapImages = getTapImages();
      state.currentTapImage = (state.currentTapImage + 1) % tapImages.length;
      const gif = document.getElementById('tapGif'); if (gif) gif.src = tapImages[state.currentTapImage];
    }
    
    function updateBoneDisplay() { const bd = document.getElementById('boneDisplay'); if (bd) bd.textContent = formatNum(state.bones); }
    
    let autoInterval;
    function startAutoCollector() {
      if (autoInterval) clearInterval(autoInterval);
      autoInterval = setInterval(() => {
        if (state.autoCollector > 0) {
          const totalMult = getTotalMultiplier();
          state.bones += state.autoCollector * totalMult; addExp(state.autoCollector); updateBoneDisplay();
          if (state.tabActive === 'upgrades') renderUpgradesTab();
          else if (state.tabActive === 'prestige') renderPrestigeTab();
        }
      }, 1000);
    }

      document.getElementById('upgradeAutoBtn').addEventListener('click', () => { const price = getAutoCollectorCost(); if (state.bones >= price) { state.bones -= price; state.autoCollectorOwned++; state.autoCollector++; updateBoneDisplay(); renderUpgradesTab(); } else alert('Not enough bones!'); });

      container.innerHTML = `<div class="prestige-item"><div class="prestige-info"><span>🌟 Prestige (Reset progress)</span><span>Next Cost: ${formatNum(nextCost)} 🦴</span></div><p class="next-cost">Owned: ${formatNum(state.prestigeOwned)} | Max buy: ${maxPrestige.count} (${formatNum(maxPrestige.totalCost)} 🦴)</p><p class="next-cost">Current multiplier: x${totalMult} (earnings & XP)</p>${maxPrestige.count > 0 ? `<p class="cost-breakdown">After max buy: Owned ${formatNum(state.prestigeOwned + maxPrestige.count)} | Multiplier: x${multAfterMax} | Next cost: ${formatNum(costAfterMax)} 🦴 | Stats +${maxPrestige.count}</p>` : ''}<div class="prestige-buttons"><button id="maxPrestigeBtn" class="max-buy-btn" ${maxPrestige.count === 0 ? 'disabled' : ''}>Max (${maxPrestige.count})</button></div>${maxPrestige.count === 0 ? '<p style="color:#ff4444; font-size:0.8rem; margin-top:5px;">Not enough bones! Need ' + formatNum(nextCost - state.bones) + ' more 🦴</p>' : ''}</div><p style="color:#cccccc; margin-top:10px;">Prestige resets: Level, Bones, Tap Power, Auto Collector.</p><p style="color:#ffd700; font-size:0.8rem;">Each prestige gives: +1x earnings multiplier, +1x XP boost, +1 to all breed stats!</p>`;

    function renderShopTab() {
      const container = document.getElementById('tabContent'); if (!container) return;
      let html = `<div style="color:#ffffff;"><h3 style="color:#ffd700; margin-bottom:5px;">🛒 Permanent Multiplier Shop</h3>
        <div class="polygon-rate">🔷 Polygon (POL) Rate: £${POLYGON_RATE_GBP.toFixed(2)}/POL • Low fees • Unlimited purchases!</div>
        <p style="color:#cccccc; font-size:0.8rem; margin-bottom:10px;">Buy as many times as you want! Multipliers stack additively.</p>`;
      
      state.shopTiers.forEach((tier, index) => {
        const purchaseCount = state.tierPurchases[tier.id] || 0;
        const totalFromTier = tier.multiplier * purchaseCount;
        const isBestValue = index === 4;
        const isFeatured = index === 2;
        let tierClass = 'shop-tier';
        if (isBestValue) tierClass += ' best-value';
        else if (isFeatured) tierClass += ' featured';
        
        html += `<div class="${tierClass}">
          ${isBestValue ? '<div class="best-value-badge">BEST VALUE</div>' : (isFeatured ? '<div class="tier-badge">POPULAR</div>' : '')}
          <div class="tier-header">Tier ${tier.id}: ${tier.name}</div>
          <div class="tier-multiplier">+x${tier.multiplier} Multiplier</div>
          <div class="tier-price">£${tier.price.toFixed(2)}</div>
          <div class="tier-polygon-price">🔷 ${gbpToPolygon(tier.price)} POL</div>
          ${purchaseCount > 0 ? `<div class="tier-owned-count">📦 Purchased: ${purchaseCount}x | Total: +${totalFromTier}x multiplier</div>` : ''}
          <div class="tier-value">${tier.value}</div>
          <button class="buy-tier-btn" id="buyTier${tier.id}">Buy Now</button>
          <div class="payment-options">
            <button class="payment-btn polygon-btn" id="polygonBtn${tier.id}">🔷 Pay with POL</button>
            <button class="payment-btn" id="paypalBtn${tier.id}">💰 PayPal</button>
          </div>
        </div>`;
      });
      
      html += `<p style="color:#888888; font-size:0.7rem; margin-top:10px; text-align:center;">🔒 Secure payments on Polygon • Low gas fees • Unlimited purchases • Multipliers stack!</p></div>`;
      container.innerHTML = html;
      
      state.shopTiers.forEach(tier => {
        document.getElementById('polygonBtn' + tier.id)?.addEventListener('click', () => purchaseTierWithPolygon(tier.id));
        document.getElementById('paypalBtn' + tier.id)?.addEventListener('click', () => purchaseTierWithPaypal(tier.id));
        document.getElementById('buyTier' + tier.id)?.addEventListener('click', () => purchaseTierWithPolygon(tier.id));
      });
    }

    const appDiv = document.getElementById('app');
    document.getElementById('importFileInput').addEventListener('change', handleFileImport);
    renderLoginScreen();
  })();
</script>
</body>
</html>
