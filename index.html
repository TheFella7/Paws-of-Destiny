<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Paws of Destiny · Idle Dog RPG</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Arial', sans-serif;
    }

    body {
      background: #000000;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
    }

    .game-container {
      max-width: 500px;
      width: 100%;
      background: #000000;
      border-radius: 0;
      box-shadow: none;
      overflow: hidden;
      border: none;
    }

    .title-banner {
      width: 100%;
      padding: 8px 0;
      background: #000000;
      border-bottom: 1px solid #222222;
    }
    .title-banner img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
    }

    .game-header {
      background: #000000;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #222222;
    }
    .game-header h2 {
      color: #ffffff;
      font-weight: 800;
      letter-spacing: 2px;
      font-size: 1rem;
      text-shadow: 0 2px 4px black;
    }
    .resource-badge {
      background: #111111;
      padding: 6px 16px;
      border-radius: 30px;
      color: #ffd700;
      font-weight: bold;
      border: 1px solid #333333;
      font-size: 0.9rem;
    }

    .screen {
      display: none;
      padding: 16px;
      background: #000000;
      min-height: 500px;
    }
    .screen.active {
      display: block;
    }

    .setup-centered {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .breed-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 15px;
      width: 100%;
      max-width: 400px;
    }
    .breed-card {
      background: #0a0a0a;
      border-radius: 24px;
      padding: 12px;
      text-align: center;
      border: 2px solid #222222;
      cursor: pointer;
      transition: all 0.2s;
      color: #cccccc;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .breed-card.selected {
      border: 3px solid #ffd700;
      background: #111111;
      box-shadow: 0 0 18px #ffd700;
    }
    
    .breed-img-placeholder {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #0a0a0a;
      border-radius: 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888888;
      font-size: 0.75rem;
      background-size: cover;
      background-position: center 35%;
      border: 1px dashed #333333;
      overflow: hidden;
    }
    
    .breed-name {
      font-weight: bold;
      font-size: 0.8rem;
      text-transform: uppercase;
      margin-top: 4px;
      color: #ffffff;
    }

    .breed-stats {
      font-size: 0.65rem;
      color: #ffd700;
      margin-top: 4px;
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .input-field {
      width: 100%;
      max-width: 400px;
      padding: 14px;
      border-radius: 30px;
      border: 2px solid #333333;
      background: #0a0a0a;
      color: #ffffff;
      font-weight: bold;
      margin: 12px 0;
      outline: none;
      font-size: 1rem;
    }
    .input-field::placeholder {
      color: #888888;
    }
    .start-btn {
      background: #ffd700;
      border: none;
      padding: 16px;
      width: 100%;
      max-width: 400px;
      border-radius: 40px;
      font-weight: bold;
      font-size: 1.2rem;
      color: #000000;
      margin-top: 10px;
      cursor: pointer;
      border-bottom: 4px solid #cc9900;
    }

    .import-btn {
      background: #444444;
      border: none;
      padding: 12px;
      width: 100%;
      max-width: 400px;
      border-radius: 40px;
      font-weight: bold;
      font-size: 1rem;
      color: #ffffff;
      margin-top: 8px;
      cursor: pointer;
      border-bottom: 3px solid #666666;
    }
    .import-btn:hover {
      background: #555555;
    }

    .tap-area {
      background: transparent;
      width: 200px;
      height: 200px;
      margin: 20px auto 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      overflow: hidden;
      position: relative;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      outline: none;
    }
    .tap-area:active,
    .tap-area:focus,
    .tap-area:focus-visible {
      outline: none;
      background: transparent;
      -webkit-tap-highlight-color: transparent;
    }
    .tap-gif {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 0;
      pointer-events: none;
    }

    .level-container {
      margin: 0 auto 16px;
      max-width: 300px;
      text-align: center;
    }
    .level-display {
      color: #ffd700;
      font-weight: bold;
      font-size: 0.9rem;
      margin-bottom: 4px;
    }
    .exp-bar-bg {
      background: #111111;
      height: 12px;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #333333;
      margin-bottom: 2px;
    }
    .exp-bar-fill {
      height: 100%;
      border-radius: 6px;
      background: linear-gradient(90deg, #ffd700, #ffaa00);
      transition: width 0.3s ease;
    }
    .exp-text {
      color: #888888;
      font-size: 0.7rem;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      color: #ffffff;
      font-weight: bold;
      margin: 8px 0;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin: 8px 0;
    }
    .stat-box {
      background: #0a0a0a;
      border-radius: 10px;
      padding: 8px;
      text-align: center;
      border: 1px solid #222222;
    }
    .stat-box .stat-label {
      font-size: 0.7rem;
      color: #888888;
    }
    .stat-box .stat-value {
      font-size: 1rem;
      font-weight: bold;
      color: #ffd700;
    }

    .tab-row {
      display: flex;
      gap: 6px;
      margin-top: 14px;
    }
    .tab {
      flex: 1;
      background: #0a0a0a;
      padding: 10px 4px;
      text-align: center;
      border-radius: 20px 20px 0 0;
      font-weight: bold;
      color: #888888;
      cursor: pointer;
      border: 1px solid #222222;
      border-bottom: none;
      font-size: 0.7rem;
    }
    .tab.active {
      background: #000000;
      color: #ffd700;
      border-bottom: 2px solid #ffd700;
    }

    .upgrade-item, .shop-item, .prestige-item {
      background: #0a0a0a;
      border-radius: 20px;
      padding: 12px;
      margin: 10px 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border: 1px solid #222222;
      color: #ffffff;
    }
    .upgrade-info, .prestige-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .upgrade-buttons, .prestige-buttons {
      display: flex;
      gap: 8px;
    }
    .upgrade-buttons button, .prestige-buttons button {
      flex: 1;
      font-size: 0.75rem;
      padding: 8px 10px;
    }
    .max-buy-btn {
      background: #ffd700;
      color: #000000;
      border-bottom-color: #cc9900;
    }
    .max-buy-btn:hover {
      background: #ffed4a;
    }
    button {
      background: #222222;
      border: none;
      color: #ffffff;
      font-weight: bold;
      padding: 10px 16px;
      border-radius: 30px;
      cursor: pointer;
      border-bottom: 3px solid #444444;
    }
    button:hover { background: #333333; }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .save-slot {
      background: #0a0a0a;
      border-radius: 16px;
      padding: 14px;
      margin: 10px 0;
      border: 1px solid #333333;
      cursor: pointer;
      transition: all 0.2s;
    }
    .save-slot:hover {
      border-color: #ffd700;
      background: #111111;
    }
    .save-slot h4 {
      color: #ffd700;
      margin-bottom: 4px;
    }
    .save-slot p {
      color: #888888;
      font-size: 0.8rem;
    }
    .logout-btn {
      background: #8b0000;
      border-bottom-color: #ff0000;
      margin-top: 5px;
    }
    .logout-btn:hover { background: #a00000; }

    h3, p { color: #ffffff; }
    .next-cost {
      font-size: 0.75rem;
      color: #888888;
    }
    .cost-breakdown {
      font-size: 0.7rem;
      color: #ffd700;
      margin-top: 4px;
    }

    #importFileInput {
      display: none;
    }
  </style>
</head>
<body>
<div class="game-container" id="app"></div>
<input type="file" id="importFileInput" accept=".txt" />

<script>
  (function() {
    // ============ NUMBER FORMATTING SYSTEM ============
    
    const suffixes = [
      '', 'k', 'm', 'b', 't', 'aa', 'ab', 'ac', 'ad', 'ae', 'af', 'ag', 'ah', 'ai', 'aj', 'ak', 'al', 'am', 'an', 'ao', 'ap', 'aq', 'ar', 'as', 'at', 'au', 'av', 'aw', 'ax', 'ay', 'az',
      'ba', 'bb', 'bc', 'bd', 'be', 'bf', 'bg', 'bh', 'bi', 'bj', 'bk', 'bl', 'bm', 'bn', 'bo', 'bp', 'bq', 'br', 'bs', 'bt', 'bu', 'bv', 'bw', 'bx', 'by', 'bz',
      'ca', 'cb', 'cc', 'cd', 'ce', 'cf', 'cg', 'ch', 'ci', 'cj', 'ck', 'cl', 'cm', 'cn', 'co', 'cp', 'cq', 'cr', 'cs', 'ct', 'cu', 'cv', 'cw', 'cx', 'cy', 'cz'
    ];
    
    function formatNum(num) {
      if (num < 0) return '0';
      if (num < 1000) return Math.floor(num).toString();
      
      let tier = 0;
      let value = num;
      
      while (value >= 1000 && tier < suffixes.length - 1) {
        value /= 1000;
        tier++;
      }
      
      if (tier >= suffixes.length) {
        const extraTiers = tier - suffixes.length + 1;
        const firstLetter = Math.floor(extraTiers / 26);
        const secondLetter = extraTiers % 26;
        const dynamicSuffix = String.fromCharCode(97 + firstLetter) + String.fromCharCode(97 + secondLetter);
        return value.toFixed(2).replace(/\.?0+$/, '') + dynamicSuffix;
      }
      
      return value.toFixed(2).replace(/\.?0+$/, '') + suffixes[tier];
    }

    // ============ BREED STATS GENERATOR ============
    
    function getBreedStats(breedName) {
      let seed = 0;
      for (let i = 0; i < breedName.length; i++) {
        seed += breedName.charCodeAt(i);
      }
      
      function seededRandom(s) {
        const x = Math.sin(s * 9301 + 49297) * 233280;
        return Math.abs(x - Math.floor(x));
      }
      
      return {
        health: Math.floor(seededRandom(seed) * 5) + 1,
        strength: Math.floor(seededRandom(seed + 1) * 5) + 1,
        attack: Math.floor(seededRandom(seed + 2) * 5) + 1,
        defence: Math.floor(seededRandom(seed + 3) * 5) + 1
      };
    }

    const state = {
      screen: 'login',
      currentProfileId: null,
      playerName: '',
      breed: '',
      breedStats: null,
      bones: 0,
      totalTaps: 0,
      prestigeOwned: 0,
      tapPowerOwned: 0,
      autoCollectorOwned: 0,
      tapPower: 1,
      autoCollector: 0,
      prestigeMultiplier: 1,
      currentTapImage: 0,
      level: 1,
      exp: 0,
      expToNextLevel: 100,
      titleBannerUrl: 'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/file_000000006e3c7243adb2fa6d9b40ef21.png',
      defaultTapImages: [
        'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-054556%7E2.png',
        'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-054625%7E2.png',
        'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-054630%7E2.png',
        'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-054635%7E2.png',
        'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-054642%7E2.png',
        'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-054649%7E2.png'
      ],
      breedTapImages: {
        'Staffordshire Bull Terrier': [
          'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-062822%7E3.png',
          'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-062836%7E2.png',
          'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-062846%7E2.png',
          'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-062914%7E2.png',
          'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-062934%7E2.png',
          'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-063013%7E2.png'
        ]
      },
      breedImages: {
        'Staffordshire Bull Terrier': {
          url: 'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-062136%7E2.png',
          position: 'center 35%'
        },
        'XL Bully': {
          url: 'https://raw.githubusercontent.com/TheFella7/Paws-of-Destiny/refs/heads/main/images/Screenshot_20260514-044808%7E3.png',
          position: 'center 35%'
        }
      },
      breedOptions: [
        'Staffordshire Bull Terrier', 'American PitBull', 'American Bulldog',
        'XL Bully', 'Cane Corso', 'Japanese Akita', 'Doberman',
        'Husky', 'Chihuahua', 'Jack Russell', 'Shih Tzu'
      ]
    };

    // ============ SAVE SYSTEM ============
    
    function getAllProfiles() {
      const profiles = localStorage.getItem('pawsOfDestiny_profiles');
      return profiles ? JSON.parse(profiles) : {};
    }
    
    function saveProfiles(profiles) {
      localStorage.setItem('pawsOfDestiny_profiles', JSON.stringify(profiles));
    }
    
    function saveCurrentProfile() {
      if (!state.currentProfileId) return;
      const profiles = getAllProfiles();
      profiles[state.currentProfileId] = {
        playerName: state.playerName,
        breed: state.breed,
        breedStats: state.breedStats,
        bones: state.bones,
        totalTaps: state.totalTaps,
        prestigeOwned: state.prestigeOwned,
        tapPowerOwned: state.tapPowerOwned,
        autoCollectorOwned: state.autoCollectorOwned,
        tapPower: state.tapPower,
        autoCollector: state.autoCollector,
        prestigeMultiplier: state.prestigeMultiplier,
        currentTapImage: state.currentTapImage,
        level: state.level,
        exp: state.exp,
        expToNextLevel: state.expToNextLevel,
        lastSaved: new Date().toISOString()
      };
      saveProfiles(profiles);
    }
    
    function loadProfile(profileId) {
      const profiles = getAllProfiles();
      const profile = profiles[profileId];
      if (profile) {
        applyProfileData(profile);
        state.currentProfileId = profileId;
        return true;
      }
      return false;
    }
    
    function applyProfileData(profile) {
      state.playerName = profile.playerName || '';
      state.breed = profile.breed || '';
      state.breedStats = profile.breedStats || getBreedStats(profile.breed);
      state.bones = profile.bones || 0;
      state.totalTaps = profile.totalTaps || 0;
      state.prestigeOwned = profile.prestigeOwned || 0;
      state.tapPowerOwned = profile.tapPowerOwned || 0;
      state.autoCollectorOwned = profile.autoCollectorOwned || 0;
      state.tapPower = profile.tapPower || 1;
      state.autoCollector = profile.autoCollector || 0;
      state.prestigeMultiplier = profile.prestigeMultiplier || 1;
      state.currentTapImage = profile.currentTapImage || 0;
      state.level = profile.level || 1;
      state.exp = profile.exp || 0;
      state.expToNextLevel = profile.expToNextLevel || 100;
    }
    
    // ============ IMPORT/EXPORT SYSTEM ============
    
    function exportSaveFile() {
      const saveData = {
        playerName: state.playerName,
        breed: state.breed,
        breedStats: state.breedStats,
        bones: state.bones,
        totalTaps: state.totalTaps,
        prestigeOwned: state.prestigeOwned,
        tapPowerOwned: state.tapPowerOwned,
        autoCollectorOwned: state.autoCollectorOwned,
        tapPower: state.tapPower,
        autoCollector: state.autoCollector,
        prestigeMultiplier: state.prestigeMultiplier,
        currentTapImage: state.currentTapImage,
        level: state.level,
        exp: state.exp,
        expToNextLevel: state.expToNextLevel,
        timestamp: new Date().toISOString()
      };
      
      const saveText = JSON.stringify(saveData, null, 2);
      const blob = new Blob([saveText], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `paws_of_destiny_${state.playerName}_${new Date().toISOString().slice(0,10)}.txt`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
    
    function importSaveFile() {
      const fileInput = document.getElementById('importFileInput');
      fileInput.click();
    }
    
    function handleFileImport(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const saveData = JSON.parse(e.target.result);
          
          // Validate save data
          if (!saveData.playerName || !saveData.breed) {
            alert('Invalid save file! Missing required data.');
            return;
          }
          
          // Create new profile from imported data
          const profileId = 'profile_' + Date.now();
          state.currentProfileId = profileId;
          applyProfileData(saveData);
          
          // Save to localStorage
          saveCurrentProfile();
          
          // Load the game
          state.screen = 'main';
          renderMainGame();
          
          alert(`Save imported successfully! Welcome back, ${state.playerName}!`);
        } catch (error) {
          alert('Failed to parse save file! Make sure it\'s a valid Paws of Destiny save file.');
        }
      };
      reader.readAsText(file);
      
      // Reset file input so the same file can be imported again
      event.target.value = '';
    }
    
    function downloadSaveFile() {
      exportSaveFile();
    }
    
    function logout() {
      saveCurrentProfile();
      state.currentProfileId = null;
      state.screen = 'login';
      renderLoginScreen();
    }
    
    function deleteProfile(profileId) {
      const profiles = getAllProfiles();
      delete profiles[profileId];
      saveProfiles(profiles);
      renderLoginScreen();
    }

    // ============ STAT CALCULATIONS ============
    
    function getEffectiveStats() {
      if (!state.breedStats) return { health: 0, strength: 0, attack: 0, defence: 0 };
      return {
        health: state.breedStats.health + state.prestigeOwned,
        strength: state.breedStats.strength + state.prestigeOwned,
        attack: state.breedStats.attack + state.prestigeOwned,
        defence: state.breedStats.defence + state.prestigeOwned
      };
    }

    // ============ MULTIPLIER SYSTEM ============
    
    function getTotalMultiplier() {
      return state.prestigeOwned + 1;
    }

    // ============ UPGRADE CALCULATIONS ============
    
    function getTapPowerCost() {
      return 25 * (state.tapPowerOwned + 1);
    }
    
    function getAutoCollectorCost() {
      return 40 + (15 * state.autoCollectorOwned);
    }
    
    function getPrestigeCost(ownedCount) {
      return 500 * Math.pow(2, ownedCount);
    }
    
    function getNextPrestigeCost() {
      return 500 * Math.pow(2, state.prestigeOwned);
    }
    
    function calculateMaxTapUpgrades() {
      let affordable = 0;
      let totalCost = 0;
      let remainingBones = state.bones;
      let currentOwned = state.tapPowerOwned;
      
      while (true) {
        const cost = 25 * (currentOwned + 1);
        if (remainingBones >= cost) {
          remainingBones -= cost;
          totalCost += cost;
          affordable++;
          currentOwned++;
        } else {
          break;
        }
      }
      
      return { count: affordable, totalCost: totalCost };
    }
    
    function calculateMaxAutoUpgrades() {
      let affordable = 0;
      let totalCost = 0;
      let remainingBones = state.bones;
      let currentOwned = state.autoCollectorOwned;
      
      while (true) {
        const cost = 40 + (15 * currentOwned);
        if (remainingBones >= cost) {
          remainingBones -= cost;
          totalCost += cost;
          affordable++;
          currentOwned++;
        } else {
          break;
        }
      }
      
      return { count: affordable, totalCost: totalCost };
    }
    
    function calculateMaxPrestiges() {
      let affordable = 0;
      let totalCost = 0;
      let remainingBones = state.bones;
      let currentOwned = state.prestigeOwned;
      
      while (true) {
        const cost = getPrestigeCost(currentOwned);
        if (remainingBones >= cost) {
          remainingBones -= cost;
          totalCost += cost;
          affordable++;
          currentOwned++;
        } else {
          break;
        }
      }
      
      return { count: affordable, totalCost: totalCost };
    }
    
    function performPrestige() {
      state.prestigeOwned++;
      state.tapPowerOwned = 0;
      state.autoCollectorOwned = 0;
      state.tapPower = 1;
      state.autoCollector = 0;
      state.totalTaps = 0;
      state.level = 1;
      state.exp = 0;
      state.expToNextLevel = getExpForLevel(1);
    }
    
    // ============ HELPER FUNCTIONS ============
    
    function getTapImages() {
      return state.breedTapImages[state.breed] || state.defaultTapImages;
    }
    
    function getExpForLevel(level) {
      return Math.floor(100 * Math.pow(1.5, level - 1));
    }
    
    function addExp(amount) {
      const multipliedAmount = amount * getTotalMultiplier();
      state.exp += multipliedAmount;
      while (state.exp >= state.expToNextLevel) {
        state.exp -= state.expToNextLevel;
        state.level++;
        state.expToNextLevel = getExpForLevel(state.level);
      }
      updateExpBar();
    }
    
    function updateExpBar() {
      const expFill = document.getElementById('expFill');
      const expText = document.getElementById('expText');
      const levelDisplay = document.getElementById('levelDisplay');
      if (expFill) expFill.style.width = (state.exp / state.expToNextLevel * 100) + '%';
      if (expText) expText.textContent = `${formatNum(state.exp)} / ${formatNum(state.expToNextLevel)} EXP`;
      if (levelDisplay) levelDisplay.textContent = `⭐ Level ${formatNum(state.level)}`;
    }

    // ============ RENDER SCREENS ============
    
    function renderLoginScreen() {
      const profiles = getAllProfiles();
      const profileIds = Object.keys(profiles);
      
      let html = `
        <div class="title-banner">
          <img src="${state.titleBannerUrl}" alt="Paws of Destiny" />
        </div>
        <div class="screen active setup-centered" id="loginScreen">
          <h3 style="color:#ffd700; margin-bottom:15px;">🐾 Paws of Destiny</h3>
          <p style="color:#cccccc; margin-bottom:20px;">Welcome back! Select your profile, import a save, or create a new one.</p>
      `;
      
      if (profileIds.length > 0) {
        html += `<div style="width:100%; max-width:400px;">`;
        profileIds.forEach(id => {
          const profile = profiles[id];
          html += `
            <div class="save-slot" data-profile="${id}">
              <h4>🐕 ${profile.playerName}</h4>
              <p>${profile.breed} | Level ${formatNum(profile.level)} | 🦴 ${formatNum(profile.bones)}</p>
              <p style="font-size:0.7rem;">Last played: ${new Date(profile.lastSaved).toLocaleDateString()}</p>
              <button class="delete-profile-btn" data-profile="${id}" style="background:#440000; margin-top:6px; font-size:0.7rem;">🗑️ Delete</button>
            </div>
          `;
        });
        html += `</div>`;
      } else {
        html += `<p style="color:#888888; margin:20px 0;">No profiles found. Create your first one or import a save!</p>`;
      }
      
      html += `
          <button class="start-btn" id="newProfileBtn" style="margin-top:20px;">✨ New Profile</button>
          <button class="import-btn" id="importSaveBtn">📥 Import Save File (.txt)</button>
        </div>
      `;
      
      appDiv.innerHTML = html;
      
      document.querySelectorAll('.save-slot').forEach(slot => {
        slot.addEventListener('click', (e) => {
          if (e.target.classList.contains('delete-profile-btn')) return;
          const profileId = slot.dataset.profile;
          if (loadProfile(profileId)) {
            state.screen = 'main';
            renderMainGame();
          }
        });
      });
      
      document.querySelectorAll('.delete-profile-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (confirm('Delete this profile? This cannot be undone!')) {
            deleteProfile(btn.dataset.profile);
          }
        });
      });
      
      document.getElementById('newProfileBtn').addEventListener('click', () => {
        state.screen = 'setup';
        state.currentProfileId = 'profile_' + Date.now();
        state.playerName = '';
        state.breed = '';
        state.breedStats = null;
        state.bones = 0;
        state.totalTaps = 0;
        state.prestigeOwned = 0;
        state.tapPowerOwned = 0;
        state.autoCollectorOwned = 0;
        state.tapPower = 1;
        state.autoCollector = 0;
        state.prestigeMultiplier = 1;
        state.currentTapImage = 0;
        state.level = 1;
        state.exp = 0;
        state.expToNextLevel = getExpForLevel(1);
        renderSetup();
      });
      
      document.getElementById('importSaveBtn').addEventListener('click', importSaveFile);
    }
    
    function renderSetup() {
      let html = `
        <div class="title-banner">
          <img src="${state.titleBannerUrl}" alt="Paws of Destiny" />
        </div>
        <div class="screen active setup-centered" id="setupScreen">
          <h3 style="color:#ffd700; margin-bottom:10px;">🐾 Choose Your Destiny</h3>
          <input class="input-field" id="nameInput" placeholder="Enter your dog's name" value="${state.playerName}" />
          <p style="color:#cccccc; font-weight:bold;">Pick your breed:</p>
          <div class="breed-grid" id="breedGrid">
            ${state.breedOptions.map(breed => {
              const breedData = state.breedImages[breed];
              const imgUrl = breedData?.url || '';
              const imgPosition = breedData?.position || 'center 35%';
              const imgStyle = imgUrl ? `background-image: url('${imgUrl}'); background-size: cover; background-position: ${imgPosition};` : '';
              const imgContent = imgUrl ? '' : '🖼️<br>add image';
              const stats = getBreedStats(breed);
              return `
                <div class="breed-card ${state.breed === breed ? 'selected' : ''}" data-breed="${breed}">
                  <div class="breed-img-placeholder" style="${imgStyle}">${imgContent}</div>
                  <div class="breed-name">${breed}</div>
                  <div class="breed-stats">
                    <span>❤️${stats.health}</span>
                    <span>💪${stats.strength}</span>
                    <span>⚔️${stats.attack}</span>
                    <span>🛡️${stats.defence}</span>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
          <button class="start-btn" id="startGameBtn">⚔️ Enter Paws of Destiny</button>
          <button class="logout-btn" id="backToLoginBtn" style="margin-top:8px;">↩️ Back to Profiles</button>
        </div>
      `;
      appDiv.innerHTML = html;
      
      document.getElementById('nameInput').addEventListener('input', (e) => { state.playerName = e.target.value; });
      document.querySelectorAll('.breed-card').forEach(card => {
        card.addEventListener('click', () => {
          state.breed = card.dataset.breed;
          state.breedStats = getBreedStats(state.breed);
          renderSetup();
        });
      });
      document.getElementById('startGameBtn').addEventListener('click', () => {
        if (!state.playerName.trim()) { alert('Please enter a name!'); return; }
        if (!state.breed) { alert('Please select a breed!'); return; }
        state.screen = 'main';
        saveCurrentProfile();
        renderMainGame();
      });
      document.getElementById('backToLoginBtn').addEventListener('click', () => {
        state.screen = 'login';
        renderLoginScreen();
      });
    }
    
    function renderMainGame() {
      const tapImages = getTapImages();
      const currentImage = tapImages[state.currentTapImage];
      const totalMult = getTotalMultiplier();
      let html = `
        <div class="title-banner">
          <img src="${state.titleBannerUrl}" alt="Paws of Destiny" />
        </div>
        <div class="game-header">
          <h2>🐕 ${state.playerName}</h2>
          <div class="resource-badge">🦴 <span id="boneDisplay">${formatNum(state.bones)}</span></div>
        </div>
        <div class="screen active" id="mainScreen">
          <div class="tap-area" id="tapDog">
            <img src="${currentImage}" alt="Tap Dog" class="tap-gif" id="tapGif" />
          </div>
          <div class="level-container">
            <div class="level-display" id="levelDisplay">⭐ Level ${formatNum(state.level)}</div>
            <div class="exp-bar-bg">
              <div class="exp-bar-fill" id="expFill" style="width: ${(state.exp / state.expToNextLevel) * 100}%;"></div>
            </div>
            <div class="exp-text" id="expText">${formatNum(state.exp)} / ${formatNum(state.expToNextLevel)} EXP (x${totalMult})</div>
          </div>
          <div class="stat-row"><span>${state.breed}</span><span>⭐ Prestige ${formatNum(state.prestigeOwned)}</span></div>
          <div class="tab-row">
            <div class="tab active" data-tab="profile">🐶 Profile</div>
            <div class="tab" data-tab="upgrades">📈 Upgrades</div>
            <div class="tab" data-tab="prestige">🌟 Prestige</div>
            <div class="tab" data-tab="shop">🛒 Shop</div>
          </div>
          <div id="tabContent"></div>
        </div>
      `;
      appDiv.innerHTML = html;
      document.getElementById('tapDog').addEventListener('click', handleTap);
      attachTabEvents();
      renderProfileTab();
      startAutoCollector();
    }
    
    function handleTap() {
      const totalMult = getTotalMultiplier();
      state.bones += state.tapPower * totalMult;
      state.totalTaps++;
      addExp(state.tapPower);
      updateBoneDisplay();
      cycleToNextImage();
      
      if (state.tabActive === 'upgrades') {
        renderUpgradesTab();
      } else if (state.tabActive === 'profile') {
        renderProfileTab();
      } else if (state.tabActive === 'prestige') {
        renderPrestigeTab();
      }
    }
    
    function cycleToNextImage() {
      const tapImages = getTapImages();
      state.currentTapImage = (state.currentTapImage + 1) % tapImages.length;
      const gif = document.getElementById('tapGif');
      if (gif) gif.src = tapImages[state.currentTapImage];
    }
    
    function updateBoneDisplay() {
      const bd = document.getElementById('boneDisplay');
      if (bd) bd.textContent = formatNum(state.bones);
    }
    
    let autoInterval;
    function startAutoCollector() {
      if (autoInterval) clearInterval(autoInterval);
      autoInterval = setInterval(() => {
        if (state.autoCollector > 0) {
          const totalMult = getTotalMultiplier();
          state.bones += state.autoCollector * totalMult;
          addExp(state.autoCollector);
          updateBoneDisplay();
          
          if (state.tabActive === 'upgrades') {
            renderUpgradesTab();
          } else if (state.tabActive === 'prestige') {
            renderPrestigeTab();
          }
        }
      }, 1000);
    }
    
    state.tabActive = 'profile';
    function attachTabEvents() {
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          state.tabActive = tab.dataset.tab;
          switch (state.tabActive) {
            case 'profile': renderProfileTab(); break;
            case 'upgrades': renderUpgradesTab(); break;
            case 'prestige': renderPrestigeTab(); break;
            case 'shop': renderShopTab(); break;
          }
        });
      });
    }
    
    function renderProfileTab() {
      const container = document.getElementById('tabContent');
      if (!container) return;
      
      const stats = getEffectiveStats();
      const totalMult = getTotalMultiplier();
      
      container.innerHTML = `
        <div style="color:#ffffff; padding:10px;">
          <h3 style="color:#ffd700;">🐾 ${state.playerName}</h3>
          <p><strong>Breed:</strong> ${state.breed}</p>
          
          <div class="stats-grid">
            <div class="stat-box">
              <div class="stat-label">❤️ Health</div>
              <div class="stat-value">${stats.health}</div>
            </div>
            <div class="stat-box">
              <div class="stat-label">💪 Strength</div>
              <div class="stat-value">${stats.strength}</div>
            </div>
            <div class="stat-box">
              <div class="stat-label">⚔️ Attack</div>
              <div class="stat-value">${stats.attack}</div>
            </div>
            <div class="stat-box">
              <div class="stat-label">🛡️ Defence</div>
              <div class="stat-value">${stats.defence}</div>
            </div>
          </div>
          
          <p><strong>Level:</strong> ${formatNum(state.level)} | <strong>Prestige:</strong> ${formatNum(state.prestigeOwned)}</p>
          <p>⭐ EXP: ${formatNum(state.exp)} / ${formatNum(state.expToNextLevel)}</p>
          <p>🦴 Bones: ${formatNum(state.bones)}</p>
          <p>⚡ Tap Power: ${formatNum(state.tapPower)} (owned: ${formatNum(state.tapPowerOwned)}) | 🕒 Auto: ${formatNum(state.autoCollector)}/s (owned: ${formatNum(state.autoCollectorOwned)})</p>
          <p>🌟 Prestige Multiplier: x${totalMult}</p>
          <p style="color:#ffd700; font-size:0.8rem;">Each prestige gives +1x earnings & XP boost!</p>
          <button id="downloadSaveBtn" style="margin-top:10px; width:100%;">💾 Download Save File (.txt)</button>
          <button id="logoutBtn" class="logout-btn" style="margin-top:8px; width:100%;">🚪 Logout (Save & Exit)</button>
          <p style="color:#888888; font-size:0.7rem; margin-top:5px;">Export your save to play anywhere!</p>
        </div>
      `;
      document.getElementById('downloadSaveBtn').addEventListener('click', downloadSaveFile);
      document.getElementById('logoutBtn').addEventListener('click', logout);
    }
    
    function renderUpgradesTab() {
      const container = document.getElementById('tabContent');
      if (!container) return;
      
      const tapCost = getTapPowerCost();
      const autoCost = getAutoCollectorCost();
      const maxTap = calculateMaxTapUpgrades();
      const maxAuto = calculateMaxAutoUpgrades();
      
      container.innerHTML = `
        <div class="upgrade-item">
          <div class="upgrade-info">
            <span>💪 Tap Power +1</span>
            <span>Cost: ${formatNum(tapCost)} 🦴</span>
          </div>
          <p class="next-cost">Owned: ${formatNum(state.tapPowerOwned)} | Max buy: ${maxTap.count} (${formatNum(maxTap.totalCost)} 🦴)</p>
          <div class="upgrade-buttons">
            <button id="upgradeTapBtn">Buy 1</button>
            <button id="maxTapBtn" class="max-buy-btn">Max (${maxTap.count})</button>
          </div>
        </div>
        
        <div class="upgrade-item">
          <div class="upgrade-info">
            <span>🕒 Auto Collector +1/s</span>
            <span>Cost: ${formatNum(autoCost)} 🦴</span>
          </div>
          <p class="next-cost">Owned: ${formatNum(state.autoCollectorOwned)} | Max buy: ${maxAuto.count} (${formatNum(maxAuto.totalCost)} 🦴)</p>
          <div class="upgrade-buttons">
            <button id="upgradeAutoBtn">Buy 1</button>
            <button id="maxAutoBtn" class="max-buy-btn">Max (${maxAuto.count})</button>
          </div>
        </div>
        
        <p style="color:#cccccc; margin-top:10px;">Current tap: ${formatNum(state.tapPower)} | Auto: ${formatNum(state.autoCollector)}/s | 🦴 ${formatNum(state.bones)} bones</p>
      `;
      
      document.getElementById('upgradeTapBtn').addEventListener('click', () => {
        const price = getTapPowerCost();
        if (state.bones >= price) {
          state.bones -= price;
          state.tapPowerOwned++;
          state.tapPower++;
          updateBoneDisplay();
          renderUpgradesTab();
        } else alert('Not enough bones!');
      });
      
      document.getElementById('maxTapBtn').addEventListener('click', () => {
        const max = calculateMaxTapUpgrades();
        if (max.count > 0) {
          state.bones -= max.totalCost;
          state.tapPowerOwned += max.count;
          state.tapPower += max.count;
          updateBoneDisplay();
          renderUpgradesTab();
        } else alert('Not enough bones for any upgrade!');
      });
      
      document.getElementById('upgradeAutoBtn').addEventListener('click', () => {
        const price = getAutoCollectorCost();
        if (state.bones >= price) {
          state.bones -= price;
          state.autoCollectorOwned++;
          state.autoCollector++;
          updateBoneDisplay();
          renderUpgradesTab();
        } else alert('Not enough bones!');
      });
      
      document.getElementById('maxAutoBtn').addEventListener('click', () => {
        const max = calculateMaxAutoUpgrades();
        if (max.count > 0) {
          state.bones -= max.totalCost;
          state.autoCollectorOwned += max.count;
          state.autoCollector += max.count;
          updateBoneDisplay();
          renderUpgradesTab();
        } else alert('Not enough bones for any upgrade!');
      });
    }
    
    function renderPrestigeTab() {
      const container = document.getElementById('tabContent');
      if (!container) return;
      
      const nextCost = getNextPrestigeCost();
      const maxPrestige = calculateMaxPrestiges();
      const costAfterMax = maxPrestige.count > 0 ? getPrestigeCost(state.prestigeOwned + maxPrestige.count) : nextCost;
      const totalMult = getTotalMultiplier();
      const multAfterMax = totalMult + maxPrestige.count;
      
      container.innerHTML = `
        <div class="prestige-item">
          <div class="prestige-info">
            <span>🌟 Prestige (Reset progress)</span>
            <span>Next Cost: ${formatNum(nextCost)} 🦴</span>
          </div>
          <p class="next-cost">Owned: ${formatNum(state.prestigeOwned)} | Max buy: ${maxPrestige.count} (${formatNum(maxPrestige.totalCost)} 🦴)</p>
          <p class="next-cost">Current multiplier: x${totalMult} (earnings & XP)</p>
          ${maxPrestige.count > 0 ? `<p class="cost-breakdown">After max buy: Owned ${formatNum(state.prestigeOwned + maxPrestige.count)} | Multiplier: x${multAfterMax} | Next cost: ${formatNum(costAfterMax)} 🦴 | Stats +${maxPrestige.count}</p>` : ''}
          <div class="prestige-buttons">
            <button id="maxPrestigeBtn" class="max-buy-btn" ${maxPrestige.count === 0 ? 'disabled' : ''}>Max (${maxPrestige.count})</button>
          </div>
          ${maxPrestige.count === 0 ? '<p style="color:#ff4444; font-size:0.8rem; margin-top:5px;">Not enough bones! Need ' + formatNum(nextCost - state.bones) + ' more 🦴</p>' : ''}
        </div>
        
        <p style="color:#cccccc; margin-top:10px;">Prestige resets: Level, Bones, Tap Power, Auto Collector.</p>
        <p style="color:#ffd700; font-size:0.8rem;">Each prestige gives: +1x earnings multiplier, +1x XP boost, +1 to all breed stats!</p>
      `;
      
      document.getElementById('maxPrestigeBtn').addEventListener('click', () => {
        const max = calculateMaxPrestiges();
        if (max.count > 0) {
          state.bones -= max.totalCost;
          for (let i = 0; i < max.count; i++) {
            performPrestige();
          }
          updateBoneDisplay();
          updateExpBar();
          saveCurrentProfile();
          renderPrestigeTab();
          const newMult = getTotalMultiplier();
          alert(`Max prestige complete! Did ${max.count} prestiges. Multiplier now x${newMult}. Stats +${max.count}!`);
        }
      });
    }
    
    function renderShopTab() {
      const container = document.getElementById('tabContent');
      container.innerHTML = `
        <div class="shop-item">
          <span>🦴 100 Bones</span>
          <button id="buyBones">Free (ad)</button>
        </div>
        <div class="shop-item">
          <span>⚡ 2x Tap boost (30s)</span>
          <button id="buyBoost">20 🦴</button>
        </div>
        <p style="color:#cccccc;">(Shop placeholder – dog toys coming soon)</p>
      `;
      document.getElementById('buyBones').addEventListener('click', () => {
        state.bones += 100;
        updateBoneDisplay();
        alert('You watched an ad! +100 bones.');
      });
      document.getElementById('buyBoost').addEventListener('click', () => {
        if (state.bones >= 20) {
          state.bones -= 20;
          state.tapPower *= 2;
          updateBoneDisplay();
          setTimeout(() => { state.tapPower = Math.max(1, state.tapPower/2); }, 30000);
          alert('Boost activated for 30 seconds!');
        } else alert('Not enough bones.');
      });
    }

    const appDiv = document.getElementById('app');
    
    // Set up file import listener
    document.getElementById('importFileInput').addEventListener('change', handleFileImport);
    
    // Start the app
    renderLoginScreen();
  })();
</script>
</body>
</html>
